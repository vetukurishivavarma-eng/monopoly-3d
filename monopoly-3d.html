*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;position:fixed}

canvas{display:block;touch-action:none}

.hidden{display:none!important}

.player-card{background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px;transition:all .3s;min-width:0}

.player-card .hdr .nm{font-size:.75rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .hdr .cash{font-size:.85rem;font-weight:700;color:#4caf50;white-space:nowrap}
.player-card .props{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}

.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn-danger{background:rgba(255,50,50,.2);color:#ff6b6b;border:1px solid rgba(255,50,50,.3)}
.btn-success{background:rgba(50,200,50,.2);color:#4caf50;border:1px solid rgba(50,200,50,.3)}
.btn-sm{padding:6px 12px;font-size:.75rem}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}

.modal .info-row{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px}

.modal .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

.toast-container{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;max-width:90vw}

.modal{padding:16px;width:92%;max-width:340px}

@keyframes cardFlip{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
</style>
</head>

function animateToken(token,dt){
  if(!token||!token.userData)return;const ud=token.userData;ud.animTime+=dt;
  if(ud.body)ud.body.scale.y=1+Math.sin(ud.animTime*2+ud.breathingPhase)*0.02;
  if(ud.baseY===undefined)ud.baseY=token.position.y;
  let targetY=ud.baseY+Math.sin(ud.animTime*1.5+ud.breathingPhase)*0.03;
  if(ud.moveTarget){ud.walking=true;}else{if(!ud.bouncing)ud.walking=false;}
  if(ud.walking){const ws=8;ud.armData.forEach((a,i)=>{a.rotation.x=Math.sin(ud.animTime*ws+Math.PI*i)*0.5;});ud.legData.forEach((l,i)=>{l.rotation.x=Math.sin(ud.animTime*ws+Math.PI*0.5+Math.PI*i)*0.4;});targetY+=Math.abs(Math.sin(ud.animTime*ws))*0.02;}
  else{ud.armData.forEach(a=>{a.rotation.x*=0.9;});ud.legData.forEach(l=>{l.rotation.x*=0.9;});}
  if(ud.raisingArm){ud.armRaiseTime+=dt;const p=Math.min(ud.armRaiseTime/0.5,1);if(p<0.5){const t=p*2;ud.armData[0].rotation.x=-t*0.8;ud.armData[0].children[1].rotation.x=-t*0.5;}else{const t=(p-0.5)*2;ud.armData[0].rotation.x=-(1-t)*0.8;ud.armData[0].children[1].rotation.x=-(1-t)*0.5;}if(p>=1){ud.raisingArm=false;ud.armData[0].rotation.x=0;ud.armData[0].children[1].rotation.x=0;}}
  if(ud.moveTarget){const t=ud.moveTarget;const dx=t.x-token.position.x,dz=t.z-token.position.z;const dist=Math.sqrt(dx*dx+dz*dz);if(dist<0.08){token.position.x=t.x;token.position.z=t.z;ud.moveTarget=null;ud.bouncing=true;ud.bounceTime=0;ud.baseY=0.4;if(ud.onArrive){const cb=ud.onArrive;ud.onArrive=null;cb();}}else{const step=ud.moveSpeed*dt;const r=Math.min(step/dist,1);token.position.x+=dx*r;token.position.z+=dz*r;token.rotation.y=Math.atan2(dx,dz);targetY=ud.baseY+Math.abs(Math.sin(ud.animTime*8))*0.02;}}
  if(ud.bouncing){ud.bounceTime+=dt;if(ud.bounceTime<0.4){targetY+=Math.sin(ud.bounceTime/0.4*Math.PI)*0.3;}else{ud.bouncing=false;ud.baseY=0.4;}}
  token.position.y+=(targetY-token.position.y)*Math.min(1,dt*10);
}

function createParticles(origin,color,count,duration,spread){const col=new THREE.Color(color);for(let i=0;i<count;i++){const size=0.05+Math.random()*0.1;const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,6,4),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1}));mesh.position.set(origin.x+(Math.random()-0.5)*spread,origin.y+Math.random()*0.5,origin.z+(Math.random()-0.5)*spread);const vel=new THREE.Vector3((Math.random()-0.5)*4,Math.random()*3+2,(Math.random()-0.5)*4);scene.add(mesh);particles.push({mesh,vel,life:duration,maxLife:duration,gravity:-4});}}
function createConfetti(origin,count){const colors=[0xFFD700,0xFF6B6B,0x4FC3F7,0x66BB6A,0xFF8C00,0xE040FB,0xFF4081];for(let i=0;i<count;i++){const col=colors[Math.floor(Math.random()*colors.length)];const size=0.05+Math.random()*0.12;const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1});const geo=Math.random()>0.5?new THREE.BoxGeometry(size,size*0.3,size*0.3):new THREE.SphereGeometry(size*0.5,4,4);const mesh=new THREE.Mesh(geo,mat);mesh.position.set(origin.x+(Math.random()-0.5)*5,origin.y+Math.random()*2,origin.z+(Math.random()-0.5)*5);particles.push({mesh,vel:new THREE.Vector3((Math.random()-0.5)*8,Math.random()*5+3,(Math.random()-0.5)*8),life:3+Math.random()*2,maxLife:5,gravity:-4,spin:Math.random()*Math.PI*2});scene.add(mesh);}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.vel.y+=p.gravity*dt;p.mesh.position.x+=p.vel.x*dt;p.mesh.position.y+=p.vel.y*dt;p.mesh.position.z+=p.vel.z*dt;if(p.spin)p.mesh.rotation.x+=p.spin*dt;p.life-=dt;const r=Math.max(0,p.life/p.maxLife);p.mesh.material.opacity=r;p.mesh.material.needsUpdate=true;p.mesh.scale.setScalar(0.5+r*0.5);if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}}}

function onMouseMove(e){const rect=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-rect.left)/rect.width)*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;}
function onClick(e){handleTileClick(e.clientX,e.clientY);}
function onTouchStart(e){e.preventDefault();const t=e.touches[0];if(t)handleTileClick(t.clientX,t.clientY);}
function handleTileClick(cx,cy){const rect=renderer.domElement.getBoundingClientRect();const mx=((cx-rect.left)/rect.width)*2-1,my=-((cy-rect.top)/rect.height)*2+1;raycaster.setFromCamera(new THREE.Vector2(mx,my),camera);const hits=raycaster.intersectObjects(spaceMeshes.filter(Boolean));if(hits.length>0){const si=hits[0].object.userData.spaceIdx;if(si!==undefined){showPropertyPopup(PROPERTIES[si],si,cx,cy);const mesh=spaceMeshes[si];if(mesh){mesh.position.y+=0.1;setTimeout(()=>{if(mesh)mesh.position.y-=0.1;},500);}}}}
function showPropertyPopup(prop,idx,x,y){
  const old=document.querySelector('.property-popup');if(old)old.remove();
  const owner=S.propertyOwners[idx],ownerName=owner?getP(owner)?.name||'Unknown':'Unowned',houses=S.propertyHouses[idx],mortgaged=S.propertyMortgaged[idx];
  const popup=document.createElement('div');popup.className='property-popup';const grp=prop.group?COLORS[prop.group]||'#888':'#888';const cbar=prop.group?'<div style=\"height:4px;background:'+grp+';border-radius:2px;margin-bottom:6px;\"></div>':'';
  let extra='';
  if(prop.type==='property'||prop.type==='railroad'||prop.type==='utility'){extra+='<div class=\"pp-price\">$'+(prop.price||0)+'</div>';if(owner===S.playerId&&prop.type==='property')extra+='<div class=\"pp-owner\">You own this - '+(houses>=5?'🏨 Hotel':'🏠 '+houses+' houses')+'</div>';if(mortgaged)extra+='<div class=\"pp-owner\" style=\"color:#ff6b6b;\">🏦 Mortgaged</div>';if(owner&&owner!==S.playerId)extra+='<div class=\"pp-owner\">Owned by: '+ownerName+'</div>';}
  else if(prop.type==='chance')extra='<div class=\"pp-owner\">❓ Draw a card!</div>';else if(prop.type==='community')extra='<div class=\"pp-owner\">📦 Draw a card!</div>';else if(prop.type==='tax')extra='<div class=\"pp-price\">Pay $'+(prop.taxAmount||0)+'</div>';
  popup.innerHTML=cbar+'<div class=\"pp-name\">'+prop.name+'</div>'+extra;
  let px=Math.min(x,window.innerWidth-180-10),py=Math.min(y-10,window.innerHeight-80);px=Math.max(10,px);py=Math.max(50,py);popup.style.left=px+'px';popup.style.top=py+'px';document.body.appendChild(popup);setTimeout(()=>{const p=document.querySelector('.property-popup');if(p)p.remove();},3000);
}

function addLogEntry(t){const log=document.getElementById('gameLog');const e=document.createElement('div');e.className='log-entry';e.textContent=t;log.appendChild(e);if(log.children.length>6)log.removeChild(log.firstChild);log.scrollTop=log.scrollHeight;}

function createActivePlayerEffects(){
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.06,8,32),new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:0.6}));ring.rotation.x=-Math.PI/2;ring.position.y=0.05;ring.visible=false;scene.add(ring);activePlayerGlow=ring;
  const arrow=new THREE.Mesh(new THREE.ConeGeometry(0.3,0.6,8),new THREE.MeshBasicMaterial({color:0xFFD700}));arrow.position.y=5;arrow.visible=false;scene.add(arrow);activePlayerArrow=arrow;
}
function updateActivePlayerEffects(time){
  const cp=getCP();
  if(!cp||!activePlayerGlow||!activePlayerArrow||!playerTokens[cp.id]){if(activePlayerGlow)activePlayerGlow.visible=false;if(activePlayerArrow)activePlayerArrow.visible=false;return;}
  const token=playerTokens[cp.id];activePlayerGlow.visible=true;activePlayerArrow.visible=true;
  activePlayerGlow.position.x=token.position.x;activePlayerGlow.position.z=token.position.z;
  const rs=0.8+Math.sin(time*3)*0.2;activePlayerGlow.scale.set(rs,rs,1);activePlayerGlow.material.opacity=0.3+Math.sin(time*3)*0.3;
  activePlayerGlow.material.color.setHex(getPlayerColor(cp.id));
  activePlayerArrow.position.x=token.position.x;activePlayerArrow.position.z=token.position.z;activePlayerArrow.position.y=5+Math.sin(time*3)*0.3;activePlayerArrow.rotation.x=Math.PI;
  Object.entries(playerTokens).forEach(([id,t])=>{t.scale.set(id===cp.id?1.15:1,id===cp.id?1.15:1,id===cp.id?1.15:1);});
}

function updateActivePlayerHUD(){

  if(!cp){hud.style.display='none';return;}
  hud.style.display='flex';const my=isMyTurn();const colHex='#'+getPlayerColor(cp.id).toString(16).padStart(6,'0');

  document.getElementById('hudName').textContent=cp.name||'Player';document.getElementById('hudStats').textContent='$'+cp.money+' • '+(cp.properties?cp.properties.length:0)+' properties';
  const badge=document.getElementById('hudBadge');badge.textContent=my?'YOUR TURN':'Wait';badge.style.display=my?'inline':'none';
  hud.style.borderColor=colHex;hud.style.boxShadow='0 0 25px '+colHex+'66';

function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);const time=clock.elapsedTime;
  updateCamera(dt);
  if(overviewMode){cameraBobTime+=dt;const bob=Math.sin(cameraBobTime*1.047)*0.03;camera.position.y=32+bob;camera.lookAt(0,2,0);}
  Object.values(playerTokens).forEach(t=>animateToken(t,dt));
  Object.entries(playerNameplates).forEach(([id,np])=>{np.lookAt(camera.position);});
  updateActivePlayerEffects(time);
  buildings.forEach(b=>{if(b.userData&&b.userData.baseHeight)b.scale.y=1+Math.sin(time*0.8+b.userData.phase)*0.002;});
  trees.forEach(t=>{if(t.userData&&t.userData.phase)t.rotation.z=Math.sin(time*1.2+t.userData.phase)*0.03;});
  updateWaterTexture(time);
  buildings.forEach(b=>{if(b.userData&&b.userData.blink)b.material.emissiveIntensity=Math.sin(time*3)>0?1:0;});
  if(diceAnimating){diceAnimTime+=dt;diceMeshes.forEach((dm,i)=>{const rs=15*Math.max(0,1-diceAnimTime/0.8);dm.group.rotation.x+=rs*dt;dm.group.rotation.y+=rs*dt*0.7;dm.group.rotation.z+=rs*dt*0.5;dm.shadow.material.opacity=0.2+Math.sin(diceAnimTime*10)*0.05;});}
  updateParticles(dt);
  if(chanceDeckMesh)chanceDeckMesh.position.y=0.08+Math.sin(time*0.5)*0.01;
  if(communityDeckMesh)communityDeckMesh.position.y=0.08+Math.sin(time*0.5+1)*0.01;
  renderer.render(scene,camera);
}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function rId(){return Math.random().toString(36).substring(2,10)+Date.now().toString(36);}
function grp(g){return PROPERTIES.filter(p=>p.group===g&&p.type==='property');}
function ownsFull(pid,g){const gp=grp(g);return gp.length>0&&gp.every(p=>S.propertyOwners[p.idx]===pid);}
function cntRR(pid){return[5,15,25,35].filter(i=>S.propertyOwners[i]===pid).length;}
function cntUtil(pid){return[12,28].filter(i=>S.propertyOwners[i]===pid).length;}
function getRent(idx){const p=PROPERTIES[idx],o=S.propertyOwners[idx];if(!o||S.propertyMortgaged[idx])return 0;const h=S.propertyHouses[idx];if(p.type==='railroad')return[0,25,50,100,200][cntRR(o)];if(p.type==='utility'){const c=cntUtil(o);return c===1?(S.diceValue[0]+S.diceValue[1])*4:(S.diceValue[0]+S.diceValue[1])*10;}if(h===0)return ownsFull(o,p.group)?p.rent*2:p.rent;if(h===5)return p.rentHotel;return[p.rent||0,p.rent1h||0,p.rent2h||0,p.rent3h||0,p.rent4h||0][h];}

function initGame(){
  S.chanceDeck=shuffle([...CHANCE_CARDS]);S.communityDeck=shuffle([...COMMUNITY_CARDS]);
  S.propertyOwners=new Array(40).fill(null);S.propertyHouses=new Array(40).fill(0);S.propertyMortgaged=new Array(40).fill(false);S.jailTurns={};S.jailFreeCards={};
  S.gameOver=false;S.rolled=false;S.doublesCount=0;S.diceValue=[1,1];
  S.players.forEach(p=>{p.money=1500;p.position=0;p.inJail=false;p.bankrupt=false;p.properties=[];S.jailTurns[p.id]=0;S.jailFreeCards[p.id]=0;});
  S.players=shuffle(S.players);S.currentPlayerIndex=0;
  createPlayerTokens();setTimeout(focusCameraOverview,500);
}

function createPlayerTokens(){
  Object.values(playerTokens).forEach(t=>{if(t.parent)scene.remove(t);});playerTokens={};
  Object.values(playerNameplates).forEach(n=>{if(n.parent)scene.remove(n);});playerNameplates={};
  const colors=[0xe74c3c,0x3498db,0x2ecc71,0x9b59b6];
  S.players.forEach((p,idx)=>{
    const token=createHumanToken(idx,colors[idx%4]);const pos=boardPositions[p.position]||boardPositions[0];
    if(pos)token.position.set(pos.x,0.4,pos.z);scene.add(token);playerTokens[p.id]=token;
    const np=createNameplate(p.id,p.name,colors[idx%4]);np.position.set(pos.x,4.5,pos.z);scene.add(np);playerNameplates[p.id]=np;
  });
  if(!activePlayerGlow)createActivePlayerEffects();
}

function syncTokenPositions(){
  const offs=[{x:0,z:0},{x:-0.5,z:0},{x:0.5,z:0},{x:-0.5,z:-0.5},{x:0.5,z:0},{x:0.5,z:-0.5},{x:-0.5,z:0.5}];const om={};
  S.players.forEach(p=>{if(!om[p.position])om[p.position]=0;});
  S.players.forEach(p=>{const t=playerTokens[p.id],np=playerNameplates[p.id];if(!t||!boardPositions[p.position])return;const pos=boardPositions[p.position];const off=om[p.position]||0;om[p.position]=(om[p.position]||0)+1;const o=offs[Math.min(off,offs.length-1)];const tx=pos.x+o.x,tz=pos.z+o.z;const dist=Math.sqrt((tx-t.position.x)**2+(tz-t.position.z)**2);if(dist>0.2){t.position.set(tx,0.4,tz);if(np)np.position.set(tx,4.5,tz);}if(np)updateNameplateCash(p.id);});
}

function moveTokenAnimated(player,toSpaceIdx,onDone){
  const token=playerTokens[player.id];if(!token||!boardPositions[toSpaceIdx]){player.position=toSpaceIdx;syncTokenPositions();if(onDone)onDone();return;}
  const oldPos=player.position,steps=[];
  if(toSpaceIdx>oldPos){for(let i=oldPos+1;i<=toSpaceIdx;i++)steps.push(i);}else if(toSpaceIdx<oldPos){for(let i=oldPos+1;i<40;i++)steps.push(i);for(let i=0;i<=toSpaceIdx;i++)steps.push(i);}
  if(steps.length===0){player.position=toSpaceIdx;syncTokenPositions();if(onDone)onDone();return;}
  let stepIdx=0;const walkNext=()=>{if(stepIdx>=steps.length){player.position=toSpaceIdx;syncTokenPositions();const arr=getTokenWorldPosition(toSpaceIdx);cameraLookTarget={x:arr.x*0.4,y:arr.y+1,z:arr.z*0.4};if(onDone)onDone();return;}
    const np=boardPositions[steps[stepIdx]];if(!np){stepIdx++;walkNext();return;}
    const om={};S.players.forEach(p=>{if(p.position===steps[stepIdx]&&p.id!==player.id){if(!om[steps[stepIdx]])om[steps[stepIdx]]=0;om[steps[stepIdx]]++;}});
    const offs=[{x:0,z:0},{x:-0.4,z:0},{x:0.4,z:0},{x:-0.4,z:-0.4},{x:0.4,z:0},{x:0.4,z:-0.4},{x:-0.4,z:0.4}];const o=offs[Math.min(om[steps[stepIdx]]||0,offs.length-1)];
    token.userData.moveTarget={x:np.x+o.x,z:np.z+o.z};cameraLookTarget={x:(np.x+o.x)*0.4,y:1,z:(np.z+o.z)*0.4};
    token.userData.onArrive=()=>{stepIdx++;walkNext();};};walkNext();
}

function rollDiceGame(){
  if(!isMyTurn()||S.gameOver||S.modalOpen||diceAnimating)return;
  const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;S.diceValue=[d1,d2];S.rolled=true;S._rolledThisTurn=true;
  const isDoubles=d1===d2,cp=getCP();if(!cp)return;
  if(isDoubles)S.doublesCount++;else S.doublesCount=0;
  addLogEntry(cp.name+' rolled '+d1+' + '+d2+(isDoubles?' (DOUBLES!)':''));
  rollDice3D(d1,d2,()=>{
    if(S.doublesCount>=3){toast(cp.name+' rolled 3 doubles! Go to Jail!');goToJail(cp);S.doublesCount=0;endTurn();broadcastGameAction('roll',{d1,d2,isDoubles,gotoJail:true});createParticles(boardPositions[10]||{x:0,y:0.5,z:0},0,15,1,1);return;}
    if(cp.inJail){handleJailRoll(cp,isDoubles,d1+d2);broadcastGameAction('roll',{d1,d2,isDoubles,jailStay:true});return;}
    movePlayerGame(cp,d1+d2,()=>{
      if(isDoubles){toast('🎯 Doubles! Roll again!');createParticles({x:0,y:1,z:0},0xFF6F00,20,0.8,1.5);S.rolled=false;S._rolledThisTurn=true;updateUI();}
      broadcastGameAction('roll',{d1,d2,isDoubles,rolledThisTurn:S._rolledThisTurn});
    });
  });updateUI();
}

function movePlayerGame(player,steps,onDone){
  const oldPos=player.position,newPos=(oldPos+steps)%40;
  if(newPos<oldPos&&steps>0){player.money+=200;toast(player.name+' passed GO! +$200');createParticles(boardPositions[0]||{x:9.5,y:0.5,z:-9.5},0x00C853,30,2,3);createParticles(boardPositions[0]||{x:9.5,y:0.5,z:-9.5},0xFFD700,30,2,3);}
  moveTokenAnimated(player,newPos,()=>{handleLanding(player);if(onDone)onDone();});
}

function handleLanding(player){const space=PROPERTIES[player.position];if(!space)return;switch(space.type){case'property':case'railroad':case'utility':handlePropLand(player,space);break;case'chance':case'community':drawCard(player,space.type);break;case'tax':payTax(player,space);break;case'gotojail':goToJail(player);createParticles(boardPositions[10]||{x:-9.5,y:0.5,z:-9.5},0x333333,20,1,1.5);endTurn();break;}updateUI();renderPlayerPanels();}

function handlePropLand(player,space){const o=S.propertyOwners[space.idx];if(o===player.id)return;if(o!==null&&o!==undefined){const owner=getP(o);if(owner&&!S.propertyMortgaged[space.idx]){const rent=getRent(space.idx),actual=Math.min(rent,player.money);player.money-=actual;owner.money+=actual;toast('💰 '+player.name+' paid $'+actual+' rent to '+owner.name);addLogEntry(player.name+' paid $'+actual+' rent to '+owner.name);if(player.money<=0)handleDebt(player);}updateUI();renderPlayerPanels();return;}if(space.price)showBuyModal(space);}

function payTax(player,space){const a=Math.min(space.taxAmount,player.money);player.money-=a;toast('🏛️ Paid $'+a+' tax');addLogEntry(player.name+' paid $'+a+' tax');if(player.money<=0)handleDebt(player);updateUI();renderPlayerPanels();}

function goToJail(player){
  player.position=10;player.inJail=true;S.jailTurns[player.id]=0;const token=playerTokens[player.id];
  if(token&&boardPositions[10]){const pos=boardPositions[10];token.position.set(pos.x,0.4,pos.z);let c=0;const sh=()=>{if(c>=5){token.position.x=pos.x;return;}token.position.x=pos.x+(c%2===0?0.05:-0.05);c++;setTimeout(sh,60);};sh();createParticles({x:pos.x,y:0.5,z:pos.z},0x555555,15,1,1);}
  toast('🔒 '+player.name+' went to Jail!');addLogEntry(player.name+' went to Jail!');updateUI();renderPlayerPanels();
}

function drawCard(player,type){const dn=type==='chance'?'chanceDeck':'communityDeck';if(S[dn].length===0)S[dn]=shuffle([...(type==='chance'?CHANCE_CARDS:COMMUNITY_CARDS)]);const card=S[dn].pop();showCardModal(card,type,player);}

function executeCard(card,playerId){closeModal();const player=getP(playerId);if(!player)return;
  switch(card.action){
    case'goto':if(card.value<player.position){player.money+=200;toast('🏁 Passed GO!');}player.position=card.value;moveTokenAnimated(player,card.value,()=>handleLanding(player));break;
    case'collect':player.money+=card.value;toast('💵 +$'+card.value);break;
    case'pay':{const a=Math.min(card.value,player.money);player.money-=a;toast('💸 -$'+a);if(player.money<=0)handleDebt(player);break;}
    case'jailfree':S.jailFreeCards[player.id]=(S.jailFreeCards[player.id]||0)+1;toast('🎫 Got Jail Free card!');break;
    case'gotojail':goToJail(player);endTurn();break;
    case'back3':player.position=(player.position-card.value+40)%40;moveTokenAnimated(player,player.position,()=>handleLanding(player));break;
    case'nearest_rr':{const rrs=[5,15,25,35];let n=rrs.find(r=>r>player.position);if(n===undefined)n=rrs[0];if(n<player.position)player.money+=200;player.position=n;moveTokenAnimated(player,n,()=>handleLanding(player));break;}
    case'nearest_utility':{const u=[12,28];let n=u.find(x=>x>player.position);if(n===undefined)n=u[0];if(n<player.position)player.money+=200;player.position=n;moveTokenAnimated(player,n,()=>handleLanding(player));break;}
    case'repairs':{let t=0;for(const p of player.properties){const h=S.propertyHouses[p];t+=h===5?card.hotelValue:h*card.value;}t=Math.min(t,player.money);player.money-=t;toast('🔧 Paid $'+t+' repairs');if(player.money<=0)handleDebt(player);break;}
    case'pay_each':{let t=0;S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,player.money-t);player.money-=a;p.money+=a;t+=a;}});toast('💸 Paid $'+t);if(player.money<=0)handleDebt(player);break;}
    case'collect_each':S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,p.money);p.money-=a;player.money+=a;}});toast('💰 Collected $'+card.value+' each');break;
  }
  updateUI();renderPlayerPanels();broadcastGameAction('card',{cardAction:card.action});
}
function handleJailRoll(cp,isDoubles,total){if(isDoubles){toast(cp.name+' rolled doubles! Out of jail!');cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);return;}S.jailTurns[cp.id]=(S.jailTurns[cp.id]||0)+1;if(S.jailTurns[cp.id]>=3){if(cp.money>=50){cp.money-=50;cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);}else handleBankruptcy(cp);}else{toast('🔒 Jail (turn '+S.jailTurns[cp.id]+'/3)');endTurn();}}

function buyProp(player,space){if(!player||!space)return;const p=getP(player.id||player);if(!p)return;if(p.money<space.price){toast('Not enough!','error');startAuction(space);return;}p.money-=space.price;S.propertyOwners[space.idx]=p.id;p.properties.push(space.idx);toast('🏠 Bought '+space.name+'!');closeModal();updateUI();renderPlayerPanels();addLogEntry(p.name+' bought '+space.name+' for $'+space.price);const pos=boardPositions[space.idx];if(pos)createParticles({x:pos.x,y:0.5,z:pos.z},0xFFD700,25,1.5,1);broadcastGameAction('buy',{propertyIdx:space.idx});}
window.buyProp=buyProp;
function startAuction(space){closeModal();S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:(S.players.filter(p=>!p.bankrupt)[0]||{}).id};showAuctionModal(space);broadcastGameAction('auction_start',{propertyIdx:space.idx});}
window.startAuction=startAuction;
function handleAuctionBid(space,bidderId,amount){if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0};const a=S._auction,bidder=getP(bidderId);if(amount>a.highestBid&&bidder.money>=amount){a.highestBid=amount;a.highestBidder=bidderId;a.currentBidderIdx=(a.currentBidderIdx+1)%a.bidders.length;renderAuctionModal(space);broadcastGameAction('auction_bid',{propertyIdx:space.idx,bidderId,amount});}}
function passAuction(bidderId){const a=S._auction;if(!a)return;a.bidders=a.bidders.filter(b=>b.id!==bidderId);if(a.highestBidder===bidderId){a.highestBidder=null;a.highestBid=0;}if(a.bidders.length<=1){if(a.highestBidder){const w=getP(a.highestBidder);if(w){w.money-=a.highestBid;S.propertyOwners[a.property.idx]=w.id;w.properties.push(a.property.idx);toast('🔨 '+w.name+' won auction!');}}closeModal();S._auction=null;updateUI();renderPlayerPanels();broadcastGameAction('auction_end',{propertyIdx:a.property.idx});return;}renderAuctionModal(a.property);broadcastGameAction('auction_pass',{propertyIdx:a.property.idx,bidderId});}
window.handleAuctionBid=handleAuctionBid;window.passAuction=passAuction;

function endTurn(){
  if(!isMyTurn())return;S.rolled=false;S.modalOpen=false;
  let ni=S.currentPlayerIndex,att=0;do{ni=(ni+1)%S.players.length;att++;}while(S.players[ni].bankrupt&&att<=S.players.length);
  S.currentPlayerIndex=ni;focusCameraOnPlayer(S.currentPlayerIndex);
  updateUI();renderPlayerPanels();updateActivePlayerHUD();broadcastGameAction('end_turn',{nextPlayerIndex:ni});
  const cp=getCP();if(cp){const t=playerTokens[cp.id];if(t){t.userData.raisingArm=true;t.userData.armRaiseTime=0;}}
}
function handleDebt(p){if(!tryLiquidate(p))handleBankruptcy(p);updateUI();renderPlayerPanels();}
function tryLiquidate(p){if(p.money>=0)return true;for(const pi of[...p.properties]){if(S.propertyHouses[pi]>0&&S.propertyHouses[pi]<6){S.propertyHouses[pi]--;p.money+=Math.floor((PROPERTIES[pi].buildCost||50)/2);if(p.money>=0)return true;}}for(const pi of[...p.properties]){if(!S.propertyMortgaged[pi]&&S.propertyHouses[pi]===0){S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;if(p.money>=0)return true;}}return p.money>=0;}
function handleDisconnectedPlayer(discId){const p=getP(discId);if(!p||p.bankrupt)return;if(p.id===S.hostId&&S.isHost){const next=S.players.find(x=>!x.bankrupt&&x.id!==discId);if(next){S.hostId=next.id;S.isHost=false;toast('New host: '+next.name);}}p.bankrupt=true;p.connected=false;toast('⚡ '+p.name+' disconnected and bankrupt!','error');for(let i=0;i<40;i++){if(S.propertyOwners[i]===p.id){S.propertyOwners[i]=null;S.propertyHouses[i]=0;S.propertyMortgaged[i]=false;}}p.properties=[];const cp=getCP();if(cp&&cp.id===discId){S.rolled=false;S.modalOpen=false;closeModal();let ni=S.currentPlayerIndex,att=0;do{ni=(ni+1)%S.players.length;att++;}while(S.players[ni].bankrupt&&att<=S.players.length);S.currentPlayerIndex=ni;toast('Skipping disconnected '+p.name+"'s turn");}const act=S.players.filter(x=>!x.bankrupt);if(act.length<=1)endGame(act[0]);else updateUI();renderPlayerPanels();broadcastGameAction('bankruptcy',{playerId:discId});}
function handleBankruptcy(p){p.bankrupt=true;toast('💀 '+p.name+' bankrupt!','error');addLogEntry(p.name+' is bankrupt!');for(let i=0;i<40;i++){if(S.propertyOwners[i]===p.id){S.propertyOwners[i]=null;S.propertyHouses[i]=0;S.propertyMortgaged[i]=false;houseModels[i]&&houseModels[i].forEach(m=>{if(m.parent)boardGroup.remove(m);});houseModels[i]=[];}}p.properties=[];const act=S.players.filter(x=>!x.bankrupt);if(act.length<=1)endGame(act[0]);updateUI();renderPlayerPanels();broadcastGameAction('bankruptcy',{playerId:p.id});}
function endGame(w){S.gameOver=true;document.getElementById('winnerName').textContent=w.name+' wins! 🎉';const total=w.money+w.properties.reduce((t,pi)=>t+(PROPERTIES[pi].mortgage||0),0);document.getElementById('winnerStats').textContent='Final cash: $'+w.money+' | Total assets: $'+total;document.getElementById('winScreen').classList.remove('hidden');broadcastGameAction('game_over',{winnerId:w.id});createConfetti({x:0,y:2,z:0},200);}
function canBuild(p){return p&&p.properties.some(pi=>{const pr=PROPERTIES[pi];return pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)&&S.propertyHouses[pi]<5;});}

function showBuildModal(){const p=getCP();if(!p||!canBuild(p))return;const groups={};p.properties.forEach(pi=>{const pr=PROPERTIES[pi];if(pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)){if(!groups[pr.group])groups[pr.group]=[];groups[pr.group].push(pr);}});const content=Object.entries(groups).map(([g,props])=>'<div style=\"margin-bottom:12px;\"><div style=\"font-size:.85rem;font-weight:600;color:#bbb;display:flex;align-items:center;gap:6px;margin-bottom:6px;\"><span style=\"width:12px;height:12px;border-radius:3px;background:'+(COLORS[g]||'#ccc')+';display:inline-block;\"></span>'+g+' ($'+(PROPERTIES[props[0]?.idx]?.buildCost||50)+'/house)</div>'+props.map(pr=>{const h=S.propertyHouses[pr.idx],m=h>=5,c=pr.buildCost;return'<div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;margin-bottom:4px;\"><span style=\"font-size:.8rem;\">'+pr.name+'</span><div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:.8rem;\">'+'🏠'.repeat(Math.min(h,4))+(h===5?'🏨':'')+'</span>'+(m?'<span style=\"font-size:.75rem;color:#4caf50;\">MAX</span>':'<button class=\"btn btn-sm btn-success\" onclick=\"doBuild('+pr.idx+')\" '+(p.money<c?'disabled style=\"opacity:.5;\"':'')+'>Build $'+c+'</button>')+'</div></div>';}).join('')+'</div>').join('')||'<p style=\"color:#888;\">No properties eligible.</p>';showModal('🏗️ Build Houses',content);}
function doBuild(pi){const p=getCP();if(!p)return;const pr=PROPERTIES[pi];if(!pr||p.money<pr.buildCost||S.propertyHouses[pi]>=5)return;p.money-=pr.buildCost;S.propertyHouses[pi]++;toast('🏠 Built on '+pr.name+'!');closeModal();updateUI();renderPlayerPanels();addLogEntry(p.name+' built on '+pr.name);addHouseModel(pi);broadcastGameAction('build',{propertyIdx:pi});}
window.doBuild=doBuild;
function showMortgageModal(){const p=getCP();if(!p)return;const content=p.properties.map(pi=>{const pr=PROPERTIES[pi],m=S.propertyMortgaged[pi];if(S.propertyHouses[pi]>0)return'';const uc=Math.ceil(pr.mortgage*1.1);return'<div class=\"info-row\"><span class=\"label\">'+pr.name+'</span>'+(m?'<button class=\"btn btn-sm btn-secondary\" onclick=\"doUnmortgage3D('+pi+')\" '+(p.money<uc?'disabled':'')+'>Unmortgage $'+uc+'</button>':'<button class=\"btn btn-sm btn-secondary\" onclick=\"doMortgage3D('+pi+')\">Mortgage $'+pr.mortgage+'</button>')+'</div>';}).filter(Boolean).join('')||'<p style=\"color:#888;text-align:center;\">No properties available.</p>';showModal('🏦 Mortgage / Unmortgage',content);}
function doMortgage3D(pi){const p=getCP();if(!p||S.propertyHouses[pi]>0)return;S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;toast('🏦 Mortgaged!');closeModal();updateUI();renderPlayerPanels();broadcastGameAction('mortgage',{propertyIdx:pi});}
function doUnmortgage3D(pi){const p=getCP();if(!p)return;const c=Math.ceil(PROPERTIES[pi].mortgage*1.1);if(p.money<c)return;p.money-=c;S.propertyMortgaged[pi]=false;toast('✅ Unmortgaged!');closeModal();updateUI();renderPlayerPanels();broadcastGameAction('unmortgage',{propertyIdx:pi});}
window.doMortgage3D=doMortgage3D;window.doUnmortgage3D=doUnmortgage3D;

function connectWS(){const p=window.location.protocol==='https:'?'wss:':'ws:';const ws=new WebSocket(p+'//'+window.location.host);S.ws=ws;ws.onopen=()=>{S.connected=true;};ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data));}catch(ex){console.warn('WS msg error',ex);}};ws.onclose=()=>{S.connected=false;S.ws=null;if(S.gameStarted)setTimeout(connectWS,3000);};}
function send(m){if(S.ws&&S.ws.readyState===WebSocket.OPEN)S.ws.send(JSON.stringify(m));}

function handleMsg(msg){
  switch(msg.type){
    case'room_created':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=true;S.hostId=msg.playerId;S.players=msg.players||[];document.getElementById('roomCodeTop').textContent=msg.roomCode;document.getElementById('roomCode').textContent=msg.roomCode;showScreen('room');updatePlayerList(msg.players);break;
    case'room_joined':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=false;S.hostId=msg.hostId;S.players=msg.players||[];document.getElementById('roomCodeTop').textContent=msg.roomCode;document.getElementById('roomCode').textContent=msg.roomCode;showScreen('room');updatePlayerList(msg.players);break;
    case'player_joined':S.players=msg.players||S.players;updatePlayerList(msg.players);toast(msg.player.name+' joined');break;
    case'player_left':S.players=msg.players||S.players;updatePlayerList(msg.players);break;
    case'new_host':S.hostId=msg.hostId;if(msg.hostId===S.playerId){S.isHost=true;document.getElementById('startBtn').classList.remove('hidden');toast('You are now host');}break;
    case'player_disconnected':updatePlayerList(msg.players);toast('Player disconnected','error');if(S.gameStarted&&msg.playerId)handleDisconnectedPlayer(msg.playerId);break;
    case'game_started':startGameFromServer(msg.gameState);break;
    case'game_action':applyRemoteAction(msg);handleActionUI(msg);break;
    case'error':toast(msg.message,'error');break;
  }
}

function updatePlayerList(players){const list=document.getElementById('playerList');if(!list||!players)return;list.innerHTML=players.map(p=>'<div class=\"player-item\" style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.06);border-radius:8px;font-size:.9rem;\"><span style=\"width:8px;height:8px;border-radius:50%;background:'+(p.connected?'#4caf50':'#f44336')+';\"></span><span>'+(p.name||'Player')+'</span>'+(p.id===S.playerId?'<span style=\"font-size:.65rem;color:#888;font-style:italic;\">(you)</span>':'')+(p.id===S.hostId?'<span style=\"font-size:.6rem;background:#ffd700;color:#1a1a2e;padding:1px 6px;border-radius:3px;font-weight:600;\">HOST</span>':'')+'</div>').join('');}

function startGameFromServer(gameState){Object.assign(S,gameState||{});S.gameStarted=true;S.rolled=S.rolled||false;document.getElementById('lobbyScreen').classList.add('hidden');document.getElementById('roomScreen').classList.add('hidden');document.getElementById('gameContainer').classList.remove('hidden');createPlayerTokens();updateUI();renderPlayerPanels();updateActivePlayerHUD();addLogEntry('Game started!');const cp=getCP();if(cp&&isMyTurn())toast('🎯 Your turn! Roll the dice!');setTimeout(focusCameraOverview,300);}
function broadcastGameAction(action,actionData){send({type:'game_action',playerId:S.playerId,action,actionData:actionData||{},gameState:createSnapshot()});}
function createSnapshot(){return{players:S.players.map(p=>({...p})),propertyOwners:[...S.propertyOwners],propertyHouses:[...S.propertyHouses],propertyMortgaged:[...S.propertyMortgaged],chanceDeck:[...S.chanceDeck],communityDeck:[...S.communityDeck],jailTurns:{...S.jailTurns},jailFreeCards:{...S.jailFreeCards},currentPlayerIndex:S.currentPlayerIndex,doublesCount:S.doublesCount,rolled:S.rolled,_rolledThisTurn:S._rolledThisTurn||false};}
function applyRemoteAction(msg){if(msg.gameState){S.players=msg.gameState.players;S.propertyOwners=msg.gameState.propertyOwners;S.propertyHouses=msg.gameState.propertyHouses;S.propertyMortgaged=msg.gameState.propertyMortgaged;S.chanceDeck=msg.gameState.chanceDeck;S.communityDeck=msg.gameState.communityDeck;S.jailTurns=msg.gameState.jailTurns;S.jailFreeCards=msg.gameState.jailFreeCards;S.currentPlayerIndex=msg.gameState.currentPlayerIndex;S.doublesCount=msg.gameState.doublesCount;S.rolled=msg.gameState.rolled||false;S._rolledThisTurn=msg.gameState._rolledThisTurn||false;}syncTokenPositions();updateUI();renderPlayerPanels();}
function handleActionUI(msg){switch(msg.action){case'buy':case'mortgage':case'unmortgage':case'build':case'card':case'roll':case'end_turn':case'bankruptcy':if(msg.actionData&&msg.actionData.propertyIdx!==undefined)addHouseModel(msg.actionData.propertyIdx);break;case'auction_start':if(msg.actionData&&msg.actionData.propertyIdx!==undefined){const sp=PROPERTIES[msg.actionData.propertyIdx];if(sp&&!S._auction){S._auction={property:sp,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:(S.players.filter(p=>!p.bankrupt)[0]||{}).id};showAuctionModal(sp);closeModal();}}break;case'auction_bid':if(msg.actionData&&S._auction){const a=S._auction;if(a.property&&a.property.idx===msg.actionData.propertyIdx&&msg.actionData.amount>a.highestBid){a.highestBid=msg.actionData.amount;a.highestBidder=msg.actionData.bidderId;a.currentBidderIdx=(a.currentBidderIdx+1)%a.bidders.length;a.currentBidder=a.bidders[a.currentBidderIdx]?.id;renderAuctionModal(a.property);}}break;case'auction_pass':if(msg.actionData&&S._auction){const a=S._auction;if(a.property&&a.property.idx===msg.actionData.propertyIdx&&msg.actionData.bidderId){const bidderIdx=a.bidders.findIndex(b=>b.id===msg.actionData.bidderId);if(bidderIdx>=0){a.bidders.splice(bidderIdx,1);if(a.highestBidder===msg.actionData.bidderId||a.highestBidder===null){a.highestBidder=null;a.highestBid=0;}if(a.bidders.length<=1){if(a.highestBidder){const w=getP(a.highestBidder);if(w){w.money-=a.highestBid;S.propertyOwners[a.property.idx]=w.id;w.properties.push(a.property.idx);toast('🔨 '+w.name+' won auction!');}}closeModal();S._auction=null;updateUI();renderPlayerPanels();}else{renderAuctionModal(a.property);}}}}break;case'auction_end':closeModal();S._auction=null;updateUI();renderPlayerPanels();break;}}

function showScreen(s){document.getElementById('lobbyScreen').classList.toggle('hidden',s!=='lobby');document.getElementById('roomScreen').classList.toggle('hidden',s!=='room');}
function updateUI(){const cp=getCP(),my=isMyTurn();document.getElementById('turnInfo').innerHTML=cp?(my?'<strong>🎯 Your turn</strong>':'<strong>'+cp.name+"'s</strong> turn"):'Setting up...';document.getElementById('rollBtn').disabled=!my||S.rolled||S.gameOver||S.modalOpen||diceAnimating;document.getElementById('endTurnBtn').classList.toggle('hidden',!my||!S.rolled||S.gameOver);document.getElementById('buildBtn').classList.toggle('hidden',!my||!canBuild(cp)||!cp);document.getElementById('bankruptcyBtn').classList.toggle('hidden',!(my&&cp&&cp.money<0));}

function renderPlayerPanels(){
  const left=document.getElementById('leftStrip'),right=document.getElementById('rightStrip'),mobile=window.innerWidth<=768;let l='',r='';
  S.players.forEach((p,idx)=>{const cur=idx===S.currentPlayerIndex,local=p.id===S.playerId;const badges=p.properties.map(pi=>'<span style="width:12px;height:12px;border-radius:2px;background:'+(COLORS[PROPERTIES[pi]?.group]||'#ccc')+';display:inline-block;'+(S.propertyMortgaged[pi]?'opacity:.4;':'')+'"></span>').join('');const card='<div class="player-card '+(cur?'active':'')+'"><div class="hdr"><span class="nm">'+(p.name||'Player')+(local?' (You)':'')+(p.bankrupt?' 💀':'')+'</span><span class="cash">$'+p.money+'</span></div>'+(p.inJail?'<span class="badge">🔒 IN JAIL</span>':'')+'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;">'+(badges||'<span style="font-size:.65rem;color:#666;">None</span>')+'</div></div>';if(mobile||S.players.length<=2)l+=card;else if(idx<Math.ceil(S.players.length/2))l+=card;else r+=card;});
  left.innerHTML=l;right.innerHTML=r;updateActivePlayerHUD();S.players.forEach(p=>{const np=playerNameplates[p.id];if(np)updateNameplateCash(p.id);});
}

function showModal(title,content){closeModal();const c=document.getElementById('modalContainer');c.innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>'+title+'</h3><div class="modal-body">'+content+'</div></div></div>';c.classList.remove('hidden');S.modalOpen=true;updateUI();}
function closeModal(){document.getElementById('modalContainer').innerHTML='';document.getElementById('modalContainer').classList.add('hidden');S.modalOpen=false;S._auction=null;updateUI();}
window.closeModal=closeModal;

function showBuyModal(space){const p=getCP();if(!p)return;showModal('🏠 Property','<p style="text-align:center;font-size:1.2rem;font-weight:700;margin-bottom:4px;">'+space.name+'</p><p style="text-align:center;font-size:1.5rem;font-weight:800;color:#ffd700;margin-bottom:8px;">$'+space.price+'</p><div class="info-row"><span class="label">Your Balance</span><span class="value" style="color:'+(p.money>=space.price?'#4caf50':'#ff6b6b')+';">$'+p.money+'</span></div><div class="info-row"><span class="label">Rent</span><span class="value">$'+(space.rent||0)+'</span></div><div class="actions"><button id="buyBtn" class="btn btn-primary" '+(p.money>=space.price?'':'disabled')+' onclick="doBuyNow(PROPERTIES['+space.idx+'])">Buy</button><button class="btn btn-secondary" onclick="startAuction(PROPERTIES['+space.idx+'])">Auction</button><button class="btn btn-secondary" onclick="closeModal();if(S.doublesCount===0)endTurn()">Skip</button></div>');}
window.doBuyNow=function(space){const cp=getCP();if(!cp||!space)return;if(cp.money<space.price){toast('Not enough!','error');startAuction(space);return;}cp.money-=space.price;S.propertyOwners[space.idx]=cp.id;cp.properties.push(space.idx);toast('🏠 Bought '+space.name+'!');closeModal();updateUI();renderPlayerPanels();const pos=boardPositions[space.idx];if(pos)createParticles({x:pos.x,y:0.5,z:pos.z},0xFFD700,25,1.5,1);addLogEntry(cp.name+' bought '+space.name+' for $'+space.price);broadcastGameAction('buy',{propertyIdx:space.idx});};

function showCardModal(card,type,player){const icon=type==='chance'?'❓':'📦';const title=type==='chance'?'CHANCE':'COMMUNITY CHEST';showModal(title,'<div class="card-animation" style="text-align:center;padding:8px;"><div style="font-size:3rem;margin-bottom:8px;">'+icon+'</div><p style="font-size:1.05rem;font-weight:500;line-height:1.6;">'+card.text+'</p><div class="actions" style="justify-content:center;margin-top:16px;"><button class="btn btn-primary" onclick="executeCard(S._lastCard, S._lastCardPlayerId)">OK</button></div></div>');S._lastCard=card;S._lastCardPlayerId=player.id;}
window.executeCard=executeCard;

function showAuctionModal(space){if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:S.players.filter(p=>!p.bankrupt)[0]?.id};renderAuctionModal(space);}
function renderAuctionModal(space){const a=S._auction;if(!a)return;const isMyBid=a.currentBidder===S.playerId;const content='<div style="text-align:center;"><div style="font-size:1.1rem;font-weight:600;">'+space.name+'</div><div style="font-size:2rem;font-weight:800;color:#ffd700;">$'+a.highestBid+'</div><div style="font-size:.85rem;color:#888;margin-bottom:12px;">'+(a.highestBidder?getP(a.highestBidder)?.name+' leads':'No bids yet')+'</div></div><div style="display:flex;flex-direction:column;gap:4px;">'+a.bidders.map(b=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;'+(b.id===a.currentBidder?'border:1px solid #ffd700;':'')+'"><span>'+b.name+'</span><span style="color:#888;">$'+b.money+'</span></div>').join('')+'</div>'+(isMyBid?'<div class="actions" style="margin-top:12px;"><button class="btn btn-primary" onclick="handleAuctionBid(PROPERTIES['+space.idx+'],S.playerId,'+(a.highestBid+10)+')" '+((getP(S.playerId)||{}).money<a.highestBid+10?'disabled style="opacity:.5;"':'')+'>Bid $'+(a.highestBid+10)+'</button><button class="btn btn-danger" onclick="passAuction(S.playerId)">Pass</button></div>':'<p style="text-align:center;color:#888;margin-top:12px;">Waiting for '+(getP(a.currentBidder)?.name||'next')+'...</p>');showModal('🔨 Auction',content);}

function toast(msg,type){const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{if(t.parentElement)t.remove();},3000);}

async function init(){
  init3D();animate();addLogEntry('Monopoly 3D Isometric Edition loaded');
  document.querySelectorAll('.token-option').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('.token-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');S.playerToken=el.dataset.token;});});
  document.getElementById('createBtn').addEventListener('click',()=>{const n=document.getElementById('nameInput').value.trim()||'Player';S.playerName=n;S.playerId=rId();connectWS();const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'create_room',playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};setTimeout(t,500);});
  document.getElementById('joinBtn').addEventListener('click',()=>{const n=document.getElementById('nameInput').value.trim()||'Player';const c=document.getElementById('codeInput').value.trim().toUpperCase();if(!c){toast('Enter room code','error');return;}S.playerName=n;S.playerId=rId();connectWS();const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'join_room',roomCode:c,playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};setTimeout(t,500);});
  document.getElementById('startBtn').addEventListener('click',()=>{if(!S.isHost)return;initGame();send({type:'start_game',gameState:createSnapshot()});S.gameStarted=true;document.getElementById('lobbyScreen').classList.add('hidden');document.getElementById('roomScreen').classList.add('hidden');document.getElementById('gameContainer').classList.remove('hidden');updateUI();renderPlayerPanels();addLogEntry('Game started!');});
  document.getElementById('leaveBtn').addEventListener('click',()=>{send({type:'leave_room'});if(S.ws)S.ws.close();S.roomCode=null;showScreen('lobby');});
  document.getElementById('rollBtn').addEventListener('click',rollDiceGame);document.getElementById('endTurnBtn').addEventListener('click',endTurn);document.getElementById('buildBtn').addEventListener('click',showBuildModal);document.getElementById('mortgageBtn').addEventListener('click',showMortgageModal);document.getElementById('bankruptcyBtn').addEventListener('click',()=>{const cp=getCP();if(cp)handleBankruptcy(cp);});document.getElementById('overviewBtn').addEventListener('click',focusCameraOverview);
  document.getElementById('playAgainBtn').addEventListener('click',()=>{document.getElementById('winScreen').classList.add('hidden');document.getElementById('lobbyScreen').classList.remove('hidden');document.getElementById('roomScreen').classList.add('hidden');S.gameStarted=false;});
  document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('createBtn').click();});document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('joinBtn').click();});
}
