<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Monopoly 3D Online</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;overflow:hidden;background:#0a0a1a;color:#fff;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{display:block}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
.hidden{display:none!important}
#topBar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:20}
#topBar .room{font-size:.75rem;color:#888;letter-spacing:2px}
#topBar .room strong{color:#ffd700}
#turnInfo{font-size:.85rem;color:#ccc}#turnInfo strong{color:#fff}
.action-bar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:20;overflow-x:auto}
.player-strip{position:fixed;left:0;top:48px;bottom:60px;width:180px;display:flex;flex-direction:column;gap:4px;padding:8px;overflow-y:auto;z-index:15}
.player-strip.right{left:auto;right:0}
.player-card{background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px;transition:all .3s}
.player-card.active{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.3)}
.player-card .hdr{display:flex;align-items:center;gap:6px}
.player-card .hdr .nm{font-size:.75rem;font-weight:600;flex:1}
.player-card .hdr .cash{font-size:.85rem;font-weight:700;color:#4caf50}
.player-card .props{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.player-card .prop{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,.15)}
.player-card .badge{font-size:.6rem;color:#ff6b6b}
.btn{padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a2e}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn-danger{background:rgba(255,50,50,.2);color:#ff6b6b;border:1px solid rgba(255,50,50,.3)}
.btn-success{background:rgba(50,200,50,.2);color:#4caf50;border:1px solid rgba(50,200,50,.3)}
.btn-sm{padding:6px 12px;font-size:.75rem}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:12px;text-align:center}
.modal p{color:#bbb;line-height:1.5;margin-bottom:8px;font-size:.9rem}
.modal .info-row{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px}
.modal .info-row .label{color:#888;font-size:.8rem}
.modal .info-row .value{font-weight:600;font-size:.85rem}
.modal .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal .actions .btn{flex:1;min-width:80px}
.toast-container{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:rgba(0,0,0,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);padding:8px 18px;border-radius:10px;font-size:.8rem;color:#fff;animation:toastIn .3s,toastOut .3s 2.7s;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.win-screen{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);animation:fadeIn .5s}
.win-screen h1{font-family:'Playfair Display',serif;font-size:3rem;color:#ffd700;margin-bottom:8px;text-shadow:0 0 30px rgba(255,215,0,.3)}
.win-screen .nm{font-size:1.3rem;color:#fff;margin-bottom:16px}
.win-screen .stats{font-size:.85rem;color:#888;margin-bottom:20px}
.dice-display{display:flex;gap:12px;justify-content:center;margin:10px 0}
.die-box{width:48px;height:48px;background:linear-gradient(145deg,#fff,#e0e0e0);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:#333;box-shadow:0 3px 10px rgba(0,0,0,.3);animation:diceRoll .3s ease-out}
@keyframes diceRoll{0%{transform:rotateX(0) rotateY(0)}50%{transform:rotateX(360deg) rotateY(360deg)}100%{transform:rotateX(720deg) rotateY(720deg)}}
@media(max-width:768px){
.player-strip{width:100%;position:static;flex-direction:row;overflow-x:auto;padding:4px;gap:4px}
.player-strip .player-card{min-width:110px;flex-shrink:0;padding:5px 7px}
.player-card .hdr .nm{font-size:.65rem}
.player-card .hdr .cash{font-size:.7rem}
.player-card .props{display:none}
.action-bar{gap:3px;padding:5px 6px}
.action-bar .btn{font-size:.65rem;padding:5px 8px}
.player-strip.right{display:none}
#topBar{padding:5px 10px}
#topBar .room{font-size:.65rem}
#turnInfo{font-size:.7rem}
.modal{padding:16px;width:92%;max-width:340px}

@media(max-width:420px){
.action-bar .btn{font-size:.6rem;padding:6px 8px;min-height:36px}
#turnInfo{font-size:.6rem}
}
.card-animation{transform-style:preserve-3d;animation:cardFlip .5s ease-out}
@keyframes cardFlip{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
</style>
</head>
<body>

{idx:33,name:'Community Chest',type:'community'},{idx:34,name:'Pennsylvania Ave',type:'property',price:320,group:'green',rent:28,rent1h:150,rent2h:450,rent3h:1000,rent4h:1200,rentHotel:1400,mortgage:160,buildCost:200},

{idx:37,name:'Park Place',type:'property',price:350,group:'darkblue',rent:35,rent1h:175,rent2h:500,rent3h:1100,rent4h:1300,rentHotel:1500,mortgage:175,buildCost:200},
{idx:38,name:'Luxury Tax',type:'tax',taxAmount:100},{idx:39,name:'Boardwalk',type:'property',price:400,group:'darkblue',rent:50,rent1h:200,rent2h:600,rent3h:1400,rent4h:1700,rentHotel:2000,mortgage:200,buildCost:200}
];

const CHANCE_CARDS=[
{text:'Advance to GO. Collect $200.',action:'goto',value:0},{text:'Advance to Illinois Ave.',action:'goto',value:24},{text:'Advance to St. Charles Place.',action:'goto',value:11},{text:'Advance to Boardwalk.',action:'goto',value:39},{text:'Bank pays you a dividend of $50.',action:'collect',value:50},{text:'Get Out of Jail Free.',action:'jailfree',value:0},{text:'Go back 3 spaces.',action:'back3',value:3},{text:'Go to Jail. Do not pass GO.',action:'gotojail',value:0},{text:'Make repairs. $25/house $100/hotel.',action:'repairs',value:25,hotelValue:100},{text:'Pay poor tax of $15.',action:'pay',value:15},{text:'Advance to Reading Railroad.',action:'goto',value:5},{text:'Advance to nearest Utility.',action:'nearest_utility'},{text:'Chairman of Board. Pay each $50.',action:'pay_each',value:50},{text:'Building loan matures. Collect $150.',action:'collect',value:150},{text:'Advance to nearest Railroad.',action:'nearest_rr'},{text:'Go to Jail!',action:'gotojail'}];
const COMMUNITY_CARDS=[
{text:'Advance to GO. Collect $200.',action:'goto',value:0},{text:'Bank error. Collect $200.',action:'collect',value:200},{text:'Doctor\'s fee. Pay $50.',action:'pay',value:50},{text:'Stock sale. Collect $50.',action:'collect',value:50},{text:'Get Out of Jail Free.',action:'jailfree'},{text:'Go to Jail!',action:'gotojail'},{text:'Grand opera. Collect $50 each.',action:'collect_each',value:50},{text:'Holiday fund. Collect $100.',action:'collect',value:100},{text:'Tax refund. Collect $20.',action:'collect',value:20},{text:'Birthday! Collect $10 each.',action:'collect_each',value:10},{text:'Insurance matures. Collect $100.',action:'collect',value:100},{text:'Hospital fees. Pay $100.',action:'pay',value:100},{text:'School fees. Pay $50.',action:'pay',value:50},{text:'Consultancy fee. Collect $25.',action:'collect',value:25},{text:'Street repairs. $40/house $115/hotel.',action:'repairs',value:40,hotelValue:115},{text:'Beauty contest 2nd prize. Collect $10.',action:'collect',value:10}];

// ============ STATE ============
const S={
  playerId:null,playerName:'',playerToken:'🚗',isHost:false,hostId:null,
  roomCode:null,ws:null,connected:false,
  gameStarted:false,players:[],currentPlayerIndex:0,
  diceValue:[1,1],doublesCount:0,rolled:false,gameOver:false,
  propertyOwners:new Array(40).fill(null),
  propertyHouses:new Array(40).fill(0),
  propertyMortgaged:new Array(40).fill(false),
  chanceDeck:[],communityDeck:[],
  jailTurns:{},jailFreeCards:{},
  modalOpen:false
};
function getP(id){return S.players.find(p=>p.id===id)}
function getCP(){return S.players[S.currentPlayerIndex]}
function isMyTurn(){const cp=getCP();return cp&&cp.id===S.playerId}
window.S=S;window.PROPERTIES=PROPERTIES;window.COLORS=COLORS;window.TOKENS=TOKENS;
window.getCP=getCP;window.getP=getP;
window.buyProp=null;window.startAuction=null;window.closeModal=null;window.executeCard=null;
window.doBuild=null;window.doMortgage3D=null;window.doUnmortgage3D=null;window.handleAuctionBid=null;window.passAuction=null;

// ============ 3D SCENE ============
let scene,camera,renderer,controls,clock;
let boardGroup,diceMeshes=[],diceBodies=[],avatarMeshes={};
let world,animatingDice=false;
const spaceMeshes=[],spaceLabels=[],houseModels=[],boardPositions=[];

function init3D(){
  clock=new THREE.Clock();scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a5c2a);scene.fog=new THREE.Fog(0x1a5c2a,30,50);
  const asp=window.innerWidth/window.innerHeight;
  camera=new THREE.PerspectiveCamera(40,asp,0.1,100);
  const mob=window.innerWidth<=768,tab=window.innerWidth<=1024&&window.innerWidth>768;
  camera.position.set(mob?22:(tab?18:16),mob?18:(tab?15:14),mob?22:(tab?18:16));
  camera.lookAt(0,0,0);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  renderer.domElement.style.touchAction='none';
  document.body.prepend(renderer.domElement);
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.5,0);controls.enableDamping=true;controls.dampingFactor=0.1;
  controls.minDistance=6;controls.maxDistance=30;controls.maxPolarAngle=Math.PI/2.2;controls.update();
  const amb=new THREE.AmbientLight(0x404060,0.4);scene.add(amb);
  const dir=new THREE.DirectionalLight(0xffeedd,1.2);
  dir.position.set(10,18,8);dir.castShadow=true;
  dir.shadow.mapSize.width=1024;dir.shadow.mapSize.height=1024;
  const d=20;dir.shadow.camera.left=-d;dir.shadow.camera.right=d;
  dir.shadow.camera.top=d;dir.shadow.camera.bottom=-d;
  dir.shadow.camera.near=1;dir.shadow.camera.far=30;scene.add(dir);
  const hem=new THREE.HemisphereLight(0x87ceeb,0x1a5c2a,0.4);scene.add(hem);
  const rim=new THREE.DirectionalLight(0x4488ff,0.3);
  rim.position.set(-8,4,-10);scene.add(rim);
  const groundGeo=new THREE.PlaneGeometry(60,60);
  const groundMat=new THREE.MeshStandardMaterial({color:0x0d3b1a,roughness:0.8});
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;ground.position.y=-0.5;ground.receiveShadow=true;scene.add(ground);
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();

    const mob=window.innerWidth<=768,tab=window.innerWidth<=1024&&window.innerWidth>768;

    controls.target.set(0,0.5,0);controls.update();renderPlayerPanels();
  });
  buildBoard();
}

// ============ BOARD ============
function buildBoard(){
  boardGroup=new THREE.Group();scene.add(boardGroup);
  const baseMat=new THREE.MeshStandardMaterial({color:0xe8f5e9,roughness:0.6});
  const base=new THREE.Mesh(new THREE.BoxGeometry(11,0.3,11),baseMat);
  base.position.y=-0.15;base.receiveShadow=true;boardGroup.add(base);

  const cs=11/13,off=5.5-cs/2;
  const bottoms=[
    {r:'12/14',c:'1/3'},{r:'12/14',c:'3/4'},{r:'12/14',c:'4/5'},{r:'12/14',c:'5/6'},{r:'12/14',c:'6/7'},
    {r:'12/14',c:'7/8'},{r:'12/14',c:'8/9'},{r:'12/14',c:'9/10'},{r:'12/14',c:'10/11'},{r:'12/14',c:'11/12'},{r:'12/14',c:'12/14'}];
  const rights=[
    {r:'11/12',c:'12/14'},{r:'10/11',c:'12/14'},{r:'9/10',c:'12/14'},{r:'8/9',c:'12/14'},{r:'7/8',c:'12/14'},
    {r:'6/7',c:'12/14'},{r:'5/6',c:'12/14'},{r:'4/5',c:'12/14'},{r:'3/4',c:'12/14'},{r:'1/3',c:'12/14'}];
  const tops=[
    {r:'1/3',c:'11/12'},{r:'1/3',c:'10/11'},{r:'1/3',c:'9/10'},{r:'1/3',c:'8/9'},{r:'1/3',c:'7/8'},
    {r:'1/3',c:'6/7'},{r:'1/3',c:'5/6'},{r:'1/3',c:'4/5'},{r:'1/3',c:'3/4'},{r:'1/3',c:'1/3'}];
  const lefts=[
    {r:'3/4',c:'1/3'},{r:'4/5',c:'1/3'},{r:'5/6',c:'1/3'},{r:'6/7',c:'1/3'},{r:'7/8',c:'1/3'},
    {r:'8/9',c:'1/3'},{r:'9/10',c:'1/3'},{r:'10/11',c:'1/3'},{r:'11/12',c:'1/3'}];
  const allP=[];
  for(let i=0;i<=10;i++)allP[i]=bottoms[i];
  for(let i=11;i<=20;i++)allP[i]=rights[i-11];
  for(let i=21;i<=30;i++)allP[i]=tops[i-21];
  for(let i=31;i<=39;i++)allP[i]=lefts[i-31];

  function parseG(rS,cS){
    const rP=rS.split('/').map(Number),cP=cS.split('/').map(Number);
    const rC=(rP[0]+rP[1])/2,cC=(cP[0]+cP[1])/2;
    return{x:-off+(cC-1)*cs+cs/2,z:-off+(rC-1)*cs+cs/2,w:(cP[1]-cP[0])*cs,d:(rP[1]-rP[0])*cs};
  }

  for(let i=0;i<40;i++){
    const p=allP[i];if(!p)continue;
    const gp=parseG(p.r,p.c),prop=PROPERTIES[i];
    const isCorner=prop.type==='go'||prop.type==='jail'||prop.type==='freeparking'||prop.type==='gotojail';
    const height=isCorner?0.25:0.2;
    const color=prop.group?COLORS[prop.group]||'#e0e0e0':'#e0e0e0';
    
    // Property space with raised border
    const borderMat=new THREE.MeshStandardMaterial({color:new THREE.Color(color),roughness:0.3,metalness:0.05});
    const borderGeo=new THREE.BoxGeometry(gp.w-0.02,height+0.03,gp.d-0.02);
    const border=new THREE.Mesh(borderGeo,borderMat);
    border.position.set(gp.x,height/2+0.015,gp.z);
    border.castShadow=true;border.receiveShadow=true;
    border.userData.spaceIdx=i;
    boardGroup.add(border);
    spaceMeshes[i]=border;
    boardPositions[i]={x:gp.x,z:gp.z};

    // Inner fill
    const fillMat=new THREE.MeshStandardMaterial({color:new THREE.Color(0xf5f5f5),roughness:0.5});
    const fillGeo=new THREE.BoxGeometry(gp.w-0.12,height-0.02,gp.d-0.12);
    const fill=new THREE.Mesh(fillGeo,fillMat);
    fill.position.set(gp.x,height/2+0.01,gp.z);
    boardGroup.add(fill);

    // Color strip at top
    if(prop.type==='property'||prop.type==='railroad'||prop.type==='utility'){
      const stripMat=new THREE.MeshStandardMaterial({color:new THREE.Color(color),roughness:0.3});
      const stripGeo=new THREE.BoxGeometry(gp.w-0.1,0.03,gp.d*0.2);
      const strip=new THREE.Mesh(stripGeo,stripMat);
      strip.position.set(gp.x,height+0.02,gp.z+gp.d*0.35);
      boardGroup.add(strip);

      // Price label on strip
      if(prop.price){
        const priceLabel=makeTextSprite('$'+prop.price,0.15,false,0x666);
        priceLabel.position.set(gp.x,height+0.12,gp.z+gp.d*0.35);
        boardGroup.add(priceLabel);
      }
    }

    // Main label
    const label=makeTextSprite(prop.name.replace(' Ave','').replace(' Pl','').replace(' Railroad',' RR').replace(' Place',''),isCorner?0.28:0.18,isCorner?true:false,isCorner?0x1b5e20:0x333);
    label.position.set(gp.x,height+0.15,gp.z);
    boardGroup.add(label);
    spaceLabels[i]=label;
    houseModels[i]=[];
  }

  // Center
  const centerMat=new THREE.MeshStandardMaterial({color:0xc8e6c9,roughness:0.7});
  const center=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.05,7.5),centerMat);
  center.position.set(0,0.03,0);center.receiveShadow=true;boardGroup.add(center);

  const logo=makeTextSprite('MONOPOLY',0.7,true,0x1b5e20);
  logo.position.set(0,0.2,0);boardGroup.add(logo);

  const subLogo=makeTextSprite('3D Edition',0.35,false,0x4a4a4a);
  subLogo.position.set(0,0.1,0);boardGroup.add(subLogo);

  addCornerLabel('GO',[-5.2,0.25,-5.2],'💰');
  addCornerLabel('JAIL',[-5.2,0.25,5.2],'🔒');
  addCornerLabel('FREE\\nPARK',[5.2,0.25,5.2],'🅿️');
  addCornerLabel('GO TO\\nJAIL',[5.2,0.25,-5.2],'🚨');
}

function addCornerLabel(text,xz,emoji){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,0)';ctx.fillRect(0,0,128,128);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='28px Arial';ctx.fillStyle='#1b5e20';
  const lines=text.split('\\n');
  lines.forEach((l,i)=>ctx.fillText(l,64,62+i*22));
  ctx.font='30px Arial';ctx.fillText(emoji,64,26);
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:true});
  const sprite=new THREE.Sprite(mat);
  sprite.position.set(xz[0],xz[1]+0.3,xz[2]);
  sprite.scale.set(0.9,0.9,1);boardGroup.add(sprite);
}

function makeTextSprite(text,size,gold,color){
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,256,64);ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=(gold?'Bold 36px':'Bold 24px')+' Arial';
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0');
  ctx.fillText(text,128,34);
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(size*8,size*2,1);return sprite;
}

function createAvatar(typeIdx,playerColor){
  const info=AVATAR_TYPES[typeIdx%8];
  const group=new THREE.Group();
  const matSkin=new THREE.MeshStandardMaterial({color:info.skin,roughness:0.7});

  const h=info.height,body=new THREE.Group();

  head.position.y=th+hr*0.8;head.castShadow=true;body.add(head);
  const hair=new THREE.Mesh(new THREE.SphereGeometry(hr*1.05,12,12),matHair);
  hair.position.y=head.position.y+hr*0.15;hair.scale.y=0.5;hair.scale.z=0.85;body.add(hair);
  const eyeMat=new THREE.MeshStandardMaterial({color:'#fff'});
  const pupilMat=new THREE.MeshStandardMaterial({color:'#222'});
  [-1,1].forEach(s=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.025*h,8,8),eyeMat);
    eye.position.set(s*0.08*h,th+hr*0.7,hr*0.8);body.add(eye);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.012*h,8,8),pupilMat);
    pupil.position.set(s*0.08*h,th+hr*0.7,hr*0.9);body.add(pupil);
  });
  const al=h*0.32,ar=0.045*h;
  [-1,1].forEach(s=>{
    const shoulder=new THREE.Group();
    shoulder.position.set(s*(tw/2+0.02),th*0.85,0);
    const ua=new THREE.Mesh(new THREE.CylinderGeometry(ar*0.8,ar,al*0.45,8),matShirt);
    ua.position.y=-al*0.225;ua.castShadow=true;shoulder.add(ua);
    const elbow=new THREE.Group();elbow.position.y=-al*0.45;
    const la=new THREE.Mesh(new THREE.CylinderGeometry(ar*0.7,ar*0.5,al*0.45,8),matSkin);
    la.position.y=-al*0.225;la.castShadow=true;elbow.add(la);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(ar*0.7,6,6),matSkin);
    hand.position.y=-al*0.45;elbow.add(hand);
    shoulder.add(elbow);
    shoulder.userData={type:'arm',side:s,elbow};body.add(shoulder);
  });
  const ll=h*0.4,lr=0.06*h;
  [-1,1].forEach(s=>{
    const hip=new THREE.Group();hip.position.set(s*0.12*h,0.02,0);
    const ul=new THREE.Mesh(new THREE.CylinderGeometry(lr*1.1,lr,ll*0.45,8),matPants);
    ul.position.y=-ll*0.225;ul.castShadow=true;hip.add(ul);

    const llm=new THREE.Mesh(new THREE.CylinderGeometry(lr,lr*0.7,ll*0.45,8),matPants);
    llm.position.y=-ll*0.225;llm.castShadow=true;knee.add(llm);

  group.add(body);
  group.userData={body,info,arms:[],legs:[],animTime:0,walking:false,targetPos:null,moveSpeed:2.5};
  body.children.forEach(c=>{
    if(c.userData.type==='arm')group.userData.arms.push(c);

function animateAvatar(a,dt){
  if(!a||!a.userData)return;
  const ud=a.userData,speed=ud.walking?1:0;
  ud.animTime+=dt*speed*5;
  const t=ud.animTime;
  ud.arms.forEach((arm,i)=>{arm.rotation.x=Math.sin(t+Math.PI*i)*0.5*speed;});
  ud.legs.forEach((leg,i)=>{leg.rotation.x=Math.sin(t+Math.PI*0.5+Math.PI*i)*0.4*speed;});
  if(ud.walking)ud.body.position.y=Math.abs(Math.sin(t))*0.05;
}

function moveAvatarTo(avatar,toX,toZ,onCb){
  if(!avatar)return;const ud=avatar.userData;
  ud.targetPos={x:toX,z:toZ};ud.walking=true;ud.onWalkComplete=onCb;
}

function updateAvatarMovement(avatar,delta){
  if(!avatar||!avatar.userData||!avatar.userData.walking)return;
  const ud=avatar.userData,tp=ud.targetPos;if(!tp)return;
  const dx=tp.x-avatar.position.x,dz=tp.z-avatar.position.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.05){
    avatar.position.x=tp.x;avatar.position.z=tp.z;ud.walking=false;
    if(ud.onWalkComplete){const cb=ud.onWalkComplete;ud.onWalkComplete=null;cb();}return;
  }
  const step=ud.moveSpeed*delta,ratio=Math.min(step/dist,1);
  avatar.position.x+=dx*ratio;avatar.position.z+=dz*ratio;
  avatar.rotation.y=Math.atan2(dx,dz);
}

// ============ DICE ============
let diceSceneGroup;

function loadCannonES(){
  return new Promise((resolve)=>{
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js';
    let resolved=false;
    const done=()=>{if(resolved)return;resolved=true;
      if(typeof CANNON==='undefined'){resolve();return;}
      world=new CANNON.World();
      world.gravity.set(0,-15,0);world.broadphase=new CANNON.NaiveBroadphase();
      world.solver.iterations=10;
      const gb=new CANNON.Body({mass:0});
      gb.addShape(new CANNON.Plane());
      gb.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);
      gb.position.y=-0.5;world.addBody(gb);resolve();
    };
    script.onload=done;script.onerror=done;
    document.head.appendChild(script);
    setTimeout(done,5000);
  });
}

function createDice(){
  diceMeshes=[];diceBodies=[];
  diceSceneGroup=new THREE.Group();scene.add(diceSceneGroup);
  if(typeof CANNON==='undefined')return;
  const mat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.2,metalness:0.1});
  const size=0.35,geo=new THREE.BoxGeometry(size,size,size);
  [-1,1].forEach((s,idx)=>{
    const m=new THREE.Mesh(geo.clone(),mat.clone());
    m.castShadow=true;m.position.set(0,2+idx*0.8,0);m.visible=false;
    diceSceneGroup.add(m);diceMeshes.push(m);
    const b=new CANNON.Body({mass:0.5,shape:new CANNON.Box(new CANNON.Vec3(size/2,size/2,size/2))});
    b.position.set(0,3+idx*0.8,0);
    b.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0),Math.random()*Math.PI*2);
    world.addBody(b);diceBodies.push(b);
  });
}

function rollDice3D(d1,d2,onCb){
  if(animatingDice)return;
  if(diceBodies.length===0){animatingDice=false;if(onCb)onCb();return;}
  animatingDice=true;
  diceMeshes.forEach((m,i)=>{
    m.visible=true;
    diceBodies[i].position.set((Math.random()-0.5),3+Math.random()*0.5,(Math.random()-0.5));
    diceBodies[i].velocity.set((Math.random()-0.5)*5,-3,(Math.random()-0.5)*5);
    diceBodies[i].angularVelocity.set((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20);
  });
  setTimeout(()=>{
    let settled=0;
    const check=()=>{
      let all=true;
      diceBodies.forEach(b=>{if(b.velocity.length()>0.1||b.angularVelocity.length()>0.1)all=false;});
      if(all&&++settled>=2){animatingDice=false;if(onCb)onCb();return;}
      setTimeout(check,100);
    };
    setTimeout(check,500);
  },500);
}

function syncDice(){
  diceMeshes.forEach((m,i)=>{
    if(!m.visible)return;
    const b=diceBodies[i];
    m.position.copy(b.position);m.quaternion.copy(b.quaternion);
    if(b.position.y<-2){b.position.set(0,1,0);b.velocity.set(0,0,0);}
  });
}

// ============ GAME LOGIC ============
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function rId(){return Math.random().toString(36).substring(2,10)+Date.now().toString(36);}
function grp(g){return PROPERTIES.filter(p=>p.group===g&&p.type==='property');}
function ownsFull(pid,g){const gp=grp(g);return gp.length>0&&gp.every(p=>S.propertyOwners[p.idx]===pid);}
function cntRR(pid){return[5,15,25,35].filter(i=>S.propertyOwners[i]===pid).length;}
function cntUtil(pid){return[12,28].filter(i=>S.propertyOwners[i]===pid).length;}

function getRent(idx){
  const p=PROPERTIES[idx],o=S.propertyOwners[idx];
  if(!o||S.propertyMortgaged[idx])return 0;
  const h=S.propertyHouses[idx];
  if(p.type==='railroad')return[0,25,50,100,200][cntRR(o)];
  if(p.type==='utility'){const c=cntUtil(o);return c===1?(S.diceValue[0]+S.diceValue[1])*4:(S.diceValue[0]+S.diceValue[1])*10;}
  if(h===0)return ownsFull(o,p.group)?p.rent*2:p.rent;
  if(h===5)return p.rentHotel;
  return[p.rent||0,p.rent1h||0,p.rent2h||0,p.rent3h||0,p.rent4h||0][h];
}

function initGame(){
  S.chanceDeck=shuffle([...CHANCE_CARDS]);S.communityDeck=shuffle([...COMMUNITY_CARDS]);
  S.propertyOwners=new Array(40).fill(null);S.propertyHouses=new Array(40).fill(0);
  S.propertyMortgaged=new Array(40).fill(false);S.jailTurns={};S.jailFreeCards={};
  S.gameOver=false;S.rolled=false;S.doublesCount=0;S.diceValue=[1,1];
  S.players.forEach(p=>{
    p.money=1500;p.position=0;p.inJail=false;p.bankrupt=false;p.properties=[];
    S.jailTurns[p.id]=0;S.jailFreeCards[p.id]=0;
  });
  S.players=shuffle(S.players);S.currentPlayerIndex=0;
  createAvatarMeshes();
}

function createAvatarMeshes(){
  Object.values(avatarMeshes).forEach(a=>{if(a.parent)scene.remove(a);});
  avatarMeshes={};
  const colors=['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1'];
  S.players.forEach((p,idx)=>{
    const avatar=createAvatar(idx,colors[idx%6]);
    const pos=boardPositions[0];
    if(pos){avatar.position.set(pos.x,0,pos.z);}
    scene.add(avatar);avatarMeshes[p.id]=avatar;
  });
}

function rollDiceGame(){
  if(!isMyTurn()||S.gameOver||S.modalOpen||animatingDice)return;
  const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
  S.diceValue=[d1,d2];S.rolled=true;
  const isDoubles=d1===d2,cp=getCP();
  if(!cp)return;
  if(isDoubles)S.doublesCount++;else S.doublesCount=0;
  
  // Show dice display
  showDiceDisplay(d1,d2);
  
  rollDice3D(d1,d2,()=>{
    if(S.doublesCount>=3){
      toast(`${cp.name} rolled 3 doubles! Go to Jail!`);
      goToJail(cp);S.doublesCount=0;
      endTurn();broadcastGameAction('roll',{d1,d2,isDoubles,gotoJail:true});return;
    }
    if(cp.inJail){
      handleJailRoll(cp,isDoubles,d1+d2);
      broadcastGameAction('roll',{d1,d2,isDoubles,jailStay:true});return;
    }
    movePlayerGame(cp,d1+d2,()=>{
      if(isDoubles){toast('🎯 Doubles! Roll again!');S.rolled=false;updateUI();}
      broadcastGameAction('roll',{d1,d2,isDoubles});
    });
  });
  updateUI();
}

function showDiceDisplay(d1,d2){
  const existing=document.getElementById('diceDisplay');
  if(existing)existing.remove();
  const div=document.createElement('div');
  div.id='diceDisplay';
  div.style.cssText='position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:16px;';
  div.innerHTML=`<div class="die-box">${d1}</div><div class="die-box">${d2}</div>`;
  document.body.appendChild(div);
  setTimeout(()=>{const e=document.getElementById('diceDisplay');if(e)e.remove();},2000);
}

function movePlayerGame(player,steps,onDone){
  const oldPos=player.position,newPos=(oldPos+steps)%40;
  if(newPos<oldPos&&steps>0){player.money+=200;toast(`${player.name} passed GO! +$200`);}
  const avatar=avatarMeshes[player.id];
  if(!avatar){player.position=newPos;handleLanding(player);if(onDone)onDone();return;}
  let step=0;
  const walkStep=()=>{
    if(step>=steps){player.position=newPos;handleLanding(player);if(onDone)onDone();return;}
    step++;
    const currentPos=(oldPos+step)%40,target=boardPositions[currentPos];
    if(target){moveAvatarTo(avatar,target.x,target.z,()=>{walkStep();});}
    else walkStep();
  };
  walkStep();
}

function handleLanding(player){
  const space=PROPERTIES[player.position];
  if(!space)return;
  switch(space.type){
    case'property':case'railroad':case'utility':handlePropLand(player,space);break;
    case'chance':case'community':drawCard(player,space.type);break;
    case'tax':payTax(player,space);break;
    case'gotojail':goToJail(player);endTurn();break;
    default:break;
  }
  updateUI();renderPlayerPanels();
}

function handlePropLand(player,space){
  const o=S.propertyOwners[space.idx];
  if(o===player.id)return;
  if(o!==null&&o!==undefined){
    const owner=getP(o);
    if(owner&&!S.propertyMortgaged[space.idx]){
      const rent=getRent(space.idx),actual=Math.min(rent,player.money);
      player.money-=actual;owner.money+=actual;
      toast(`💰 ${player.name} paid $${actual} rent to ${owner.name}`);
      if(player.money<=0)handleDebt(player);
    }
    updateUI();renderPlayerPanels();return;
  }
  if(space.price){showBuyModal(space);}
}

function payTax(player,space){
  const a=Math.min(space.taxAmount,player.money);
  player.money-=a;toast(`🏛️ Paid $${a} tax`);
  if(player.money<=0)handleDebt(player);
  updateUI();renderPlayerPanels();
}

function goToJail(player){
  player.position=10;player.inJail=true;S.jailTurns[player.id]=0;
  const a=avatarMeshes[player.id];
  if(a&&boardPositions[10]){a.position.x=boardPositions[10].x;a.position.z=boardPositions[10].z;}
  toast(`🔒 ${player.name} went to Jail!`);updateUI();renderPlayerPanels();
}

function drawCard(player,type){
  const dn=type==='chance'?'chanceDeck':'communityDeck';
  if(S[dn].length===0)S[dn]=shuffle([...(type==='chance'?CHANCE_CARDS:COMMUNITY_CARDS)]);
  const card=S[dn].pop();
  showCardModal(card,type,player);
}

function executeCard(card,player){
  closeModal();
  switch(card.action){
    case'goto':
      if(card.value<player.position){player.money+=200;toast('🏁 Passed GO!');}
      player.position=card.value;handleLanding(player);break;
    case'collect':player.money+=card.value;toast(`💵 +$${card.value}`);break;
    case'pay':{const a=Math.min(card.value,player.money);player.money-=a;toast(`💸 -$${a}`);if(player.money<=0)handleDebt(player);break;}
    case'jailfree':S.jailFreeCards[player.id]=(S.jailFreeCards[player.id]||0)+1;toast('🎫 Got Jail Free card!');break;
    case'gotojail':goToJail(player);endTurn();break;
    case'back3':player.position=(player.position-card.value+40)%40;handleLanding(player);break;
    case'nearest_rr':{const rrs=[5,15,25,35];let n=rrs.find(r=>r>player.position);if(n===undefined)n=rrs[0];if(n<player.position)player.money+=200;player.position=n;handleLanding(player);break;}
    case'nearest_utility':{const u=[12,28];let n=u.find(x=>x>player.position);if(n===undefined)n=u[0];if(n<player.position)player.money+=200;player.position=n;handleLanding(player);break;}
    case'repairs':{let t=0;for(const p of player.properties){const h=S.propertyHouses[p];t+=h===5?card.hotelValue:h*card.value;}t=Math.min(t,player.money);player.money-=t;toast(`🔧 Paid $${t} repairs`);if(player.money<=0)handleDebt(player);break;}
    case'pay_each':{let t=0;S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,player.money-t);player.money-=a;p.money+=a;t+=a;}});toast(`💸 Paid $${t}`);if(player.money<=0)handleDebt(player);break;}
    case'collect_each':S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,p.money);p.money-=a;player.money+=a;}});toast(`💰 Collected $${card.value} each`);break;
  }
  updateUI();renderPlayerPanels();
  broadcastGameAction('card',{cardAction:card.action});
}

function handleJailRoll(cp,isDoubles,total){
  if(isDoubles){toast(`${cp.name} rolled doubles! Out of jail!`);cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);return;}
  S.jailTurns[cp.id]=(S.jailTurns[cp.id]||0)+1;
  if(S.jailTurns[cp.id]>=3){
    if(cp.money>=50){cp.money-=50;cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);}
    else handleBankruptcy(cp);
  }else{toast(`🔒 Jail (turn ${S.jailTurns[cp.id]}/3)`);endTurn();}
}

function buyProp(player,space){
  if(player.money<space.price){toast('Not enough!','error');startAuction(space);return;}
  player.money-=space.price;S.propertyOwners[space.idx]=player.id;player.properties.push(space.idx);
  toast(`🏠 Bought ${space.name}!`);closeModal();updateUI();renderPlayerPanels();
  broadcastGameAction('buy',{propertyIdx:space.idx});
}
window.buyProp=buyProp;

function startAuction(space){closeModal();
  S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:(S.players.filter(p=>!p.bankrupt)[0]||{}).id};
  showAuctionModal(space);
  broadcastGameAction('auction_start',{propertyIdx:space.idx});
}
window.startAuction=startAuction;

function handleAuctionBid(space,bidderId,amount){
  if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0};
  const a=S._auction,bidder=getP(bidderId);
  if(amount>a.highestBid&&bidder.money>=amount){a.highestBid=amount;a.highestBidder=bidderId;a.currentBidderIdx=(a.currentBidderIdx+1)%a.bidders.length;renderAuctionModal(space);broadcastGameAction('auction_bid',{propertyIdx:space.idx,bidderId,amount});}
}

function passAuction(bidderId){
  const a=S._auction;if(!a)return;
  a.bidders=a.bidders.filter(b=>b.id!==bidderId);
  if(a.highestBidder===bidderId){a.highestBidder=null;a.highestBid=0;}
  if(a.bidders.length<=1){
    if(a.highestBidder){const w=getP(a.highestBidder);if(w){w.money-=a.highestBid;S.propertyOwners[a.property.idx]=w.id;w.properties.push(a.property.idx);toast(`🔨 ${w.name} won auction!`);}}
    closeModal();S._auction=null;updateUI();renderPlayerPanels();broadcastGameAction('auction_end',{propertyIdx:a.property.idx});return;
  }
  renderAuctionModal(a.property);broadcastGameAction('auction_pass',{propertyIdx:a.property.idx,bidderId});
}
window.handleAuctionBid=handleAuctionBid;window.passAuction=passAuction;

function endTurn(){
  if(!isMyTurn())return;
  S.rolled=false;S.modalOpen=false;
  let ni=S.currentPlayerIndex,att=0;
  do{ni=(ni+1)%S.players.length;att++;}while(S.players[ni].bankrupt&&att<=S.players.length);
  S.currentPlayerIndex=ni;
  updateUI();renderPlayerPanels();broadcastGameAction('end_turn',{nextPlayerIndex:ni});
}

function handleDebt(p){if(!tryLiquidate(p))handleBankruptcy(p);updateUI();renderPlayerPanels();}

function tryLiquidate(p){
  if(p.money>=0)return true;
  for(const pi of[...p.properties]){
    if(S.propertyHouses[pi]>0&&S.propertyHouses[pi]<6){S.propertyHouses[pi]--;p.money+=Math.floor((PROPERTIES[pi].buildCost||50)/2);if(p.money>=0)return true;}
  }
  for(const pi of[...p.properties]){if(!S.propertyMortgaged[pi]&&S.propertyHouses[pi]===0){S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;if(p.money>=0)return true;}}
  return p.money>=0;
}

function handleBankruptcy(p){
  p.bankrupt=true;toast(`💀 ${p.name} bankrupt!`,'error');
  for(let i=0;i<40;i++){if(S.propertyOwners[i]===p.id){S.propertyOwners[i]=null;S.propertyHouses[i]=0;S.propertyMortgaged[i]=false;}}
  p.properties=[];
  const act=S.players.filter(x=>!x.bankrupt);
  if(act.length<=1)endGame(act[0]);
  updateUI();renderPlayerPanels();broadcastGameAction('bankruptcy',{playerId:p.id});
}

function endGame(w){
  S.gameOver=true;
  document.getElementById('winnerName').textContent=`${w.name} wins! 🎉`;
  const total=w.money+w.properties.reduce((t,pi)=>t+(PROPERTIES[pi].mortgage||0),0);
  document.getElementById('winnerStats').textContent=`Final cash: $${w.money} | Total assets: $${total}`;
  document.getElementById('winScreen').classList.remove('hidden');
  broadcastGameAction('game_over',{winnerId:w.id});
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-20px;font-size:${10+Math.random()*24}px;animation:confettiFall ${2+Math.random()*3}s forwards;pointer-events:none;z-index:301;`;
    p.textContent=['🎉','🎊','💰','🏆','✨','🌟'][Math.floor(Math.random()*6)];
    document.body.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
}

// ============ BUILDING ============
function canBuild(p){return p&&p.properties.some(pi=>{const pr=PROPERTIES[pi];return pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)&&S.propertyHouses[pi]<5;});}

function showBuildModal(){
  const p=getCP();if(!p||!canBuild(p))return;
  const groups={};
  p.properties.forEach(pi=>{const pr=PROPERTIES[pi];if(pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)){if(!groups[pr.group])groups[pr.group]=[];groups[pr.group].push(pr);}});
  const content=Object.entries(groups).map(([g,props])=>`<div style="margin-bottom:12px;"><div style="font-size:.85rem;font-weight:600;color:#bbb;display:flex;align-items:center;gap:6px;margin-bottom:6px;"><span style="width:12px;height:12px;border-radius:3px;background:${COLORS[g]||'#ccc'};display:inline-block;"></span>${g} ($${PROPERTIES[props[0]?.idx]?.buildCost||50}/house)</div>${props.map(pr=>{const h=S.propertyHouses[pr.idx],m=h>=5,c=pr.buildCost;return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;margin-bottom:4px;"><span style="font-size:.8rem;">${pr.name}</span><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:.8rem;">${'🏠'.repeat(Math.min(h,4))}${h===5?'🏨':''}</span>${m?'<span style="font-size:.75rem;color:#4caf50;">MAX</span>':`<button class="btn btn-sm btn-success" onclick="doBuild(${pr.idx})" ${p.money<c?'disabled style="opacity:.5;"':''}>Build $${c}</button>`}</div></div>`;}).join('')}</div>`).join('')||'<p style="color:#888;">No properties eligible.</p>';
  showModal('🏗️ Build Houses',content);
}

function doBuild(pi){
  const p=getCP();if(!p)return;
  const pr=PROPERTIES[pi];if(!pr||p.money<pr.buildCost||S.propertyHouses[pi]>=5)return;
  p.money-=pr.buildCost;S.propertyHouses[pi]++;
  toast(`🏠 Built on ${pr.name}!`);closeModal();updateUI();renderPlayerPanels();
  broadcastGameAction('build',{propertyIdx:pi});addHouseModel(pi);
}
window.doBuild=doBuild;

function addHouseModel(si){
  const pos=boardPositions[si],houses=S.propertyHouses[si];
  if(!pos||houses===0)return;
  houseModels[si].forEach(m=>{if(m.parent)boardGroup.remove(m);});
  houseModels[si]=[];
  const cnt=Math.min(houses,5),isHotel=houses>=5;
  for(let i=0;i<cnt;i++){
    const mat=new THREE.MeshStandardMaterial({color:isHotel?0xff4444:0x44aa44,roughness:0.5});
    const h=isHotel?0.25:0.15;
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(0.12,h,0.12),mat);
    const spread=(cnt-1)*0.08;
    mesh.position.set(pos.x-i*0.08+spread/2,h/2+0.25,pos.z);
    mesh.castShadow=true;boardGroup.add(mesh);houseModels[si].push(mesh);
  }
}

// ============ MORTGAGE ============
function showMortgageModal(){
  const p=getCP();if(!p)return;
  const content=p.properties.map(pi=>{
    const pr=PROPERTIES[pi],m=S.propertyMortgaged[pi];
    if(S.propertyHouses[pi]>0)return'';
    const uc=Math.ceil(pr.mortgage*1.1);
    return`<div class="info-row"><span class="label">${pr.name}</span>${m?`<button class="btn btn-sm btn-secondary" onclick="doUnmortgage3D(${pi})" ${p.money<uc?'disabled':''}>Unmortgage $${uc}</button>`:`<button class="btn btn-sm btn-secondary" onclick="doMortgage3D(${pi})">Mortgage $${pr.mortgage}</button>`}</div>`;
  }).filter(Boolean).join('')||'<p style="color:#888;text-align:center;">No properties available.</p>';
  showModal('🏦 Mortgage / Unmortgage',content);
}

function doMortgage3D(pi){
  const p=getCP();if(!p||S.propertyHouses[pi]>0)return;
  S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;
  toast('🏦 Mortgaged!');closeModal();updateUI();renderPlayerPanels();
  broadcastGameAction('mortgage',{propertyIdx:pi});
}

function doUnmortgage3D(pi){
  const p=getCP();if(!p)return;
  const c=Math.ceil(PROPERTIES[pi].mortgage*1.1);
  if(p.money<c)return;
  p.money-=c;S.propertyMortgaged[pi]=false;
  toast('✅ Unmortgaged!');closeModal();updateUI();renderPlayerPanels();
  broadcastGameAction('unmortgage',{propertyIdx:pi});
}
window.doMortgage3D=doMortgage3D;window.doUnmortgage3D=doUnmortgage3D;

// ============ MULTIPLAYER ============
function connectWS(){
  const p=window.location.protocol==='https:'?'wss:':'ws:';
  const ws=new WebSocket(`${p}//${window.location.host}`);
  S.ws=ws;
  ws.onopen=()=>{S.connected=true;};
  ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data));}catch(ex){console.warn('WS msg error',ex);}};
  ws.onclose=()=>{S.connected=false;S.ws=null;if(S.gameStarted)setTimeout(connectWS,3000);};
}
function send(m){if(S.ws&&S.ws.readyState===WebSocket.OPEN)S.ws.send(JSON.stringify(m));}

function handleMsg(msg){
  switch(msg.type){
    case'room_created':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=true;S.hostId=msg.playerId;
      S.players=msg.players||[];
      document.getElementById('roomCodeTop').textContent=msg.roomCode;
      document.getElementById('roomCode').textContent=msg.roomCode;
      showScreen('room');updatePlayerList(msg.players);break;
    case'room_joined':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=false;S.hostId=msg.hostId;
      S.players=msg.players||[];
      document.getElementById('roomCodeTop').textContent=msg.roomCode;
      document.getElementById('roomCode').textContent=msg.roomCode;
      showScreen('room');updatePlayerList(msg.players);break;
    case'player_joined':S.players=msg.players||S.players;updatePlayerList(msg.players);toast(`${msg.player.name} joined`);break;
    case'player_left':S.players=msg.players||S.players;updatePlayerList(msg.players);break;
    case'new_host':S.hostId=msg.hostId;if(msg.hostId===S.playerId){S.isHost=true;document.getElementById('startBtn').classList.remove('hidden');toast('You are now host');}break;
    case'player_disconnected':updatePlayerList(msg.players);toast('Player disconnected','error');break;
    case'game_started':startGameFromServer(msg.gameState);break;
    case'game_action':applyRemoteAction(msg);handleActionUI(msg);break;
    case'error':toast(msg.message,'error');break;
  }
}

function updatePlayerList(players){
  const list=document.getElementById('playerList');
  if(!list||!players)return;
  list.innerHTML=players.map(p=>`<div class="player-item" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.06);border-radius:8px;font-size:.9rem;"><span style="width:8px;height:8px;border-radius:50%;background:${p.connected?'#4caf50':'#f44336'};"></span><span>${p.name||'Player'}</span>${p.id===S.playerId?'<span style="font-size:.65rem;color:#888;font-style:italic;">(you)</span>':''}${p.id===S.hostId?'<span style="font-size:.6rem;background:#ffd700;color:#1a1a2e;padding:1px 6px;border-radius:3px;font-weight:600;">HOST</span>':''}</div>`).join('');
}

function startGameFromServer(gameState){
  Object.assign(S,gameState||{});
  S.gameStarted=true;
  document.getElementById('lobbyScreen').classList.add('hidden');
  document.getElementById('roomScreen').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  createAvatarMeshes();updateUI();renderPlayerPanels();
}

function broadcastGameAction(action,actionData){
  send({type:'game_action',playerId:S.playerId,action,actionData:actionData||{},gameState:createSnapshot()});
}

function createSnapshot(){return{
  players:S.players.map(p=>({...p})),propertyOwners:[...S.propertyOwners],
  propertyHouses:[...S.propertyHouses],propertyMortgaged:[...S.propertyMortgaged],
  chanceDeck:[...S.chanceDeck],communityDeck:[...S.communityDeck],
  jailTurns:{...S.jailTurns},jailFreeCards:{...S.jailFreeCards},
  currentPlayerIndex:S.currentPlayerIndex,doublesCount:S.doublesCount
};}

function applyRemoteAction(msg){
  if(msg.gameState){
    S.players=msg.gameState.players;S.propertyOwners=msg.gameState.propertyOwners;
    S.propertyHouses=msg.gameState.propertyHouses;S.propertyMortgaged=msg.gameState.propertyMortgaged;
    S.chanceDeck=msg.gameState.chanceDeck;S.communityDeck=msg.gameState.communityDeck;
    S.jailTurns=msg.gameState.jailTurns;S.jailFreeCards=msg.gameState.jailFreeCards;
    S.currentPlayerIndex=msg.gameState.currentPlayerIndex;S.doublesCount=msg.gameState.doublesCount;
  }
  updateUI();renderPlayerPanels();
}

function handleActionUI(msg){
  switch(msg.action){
    case'buy':case'mortgage':case'unmortgage':case'build':
    case'card':case'roll':case'end_turn':case'bankruptcy':
      // State is restored from gameState; update housing visuals
      if(msg.actionData&&msg.actionData.propertyIdx!==undefined)addHouseModel(msg.actionData.propertyIdx);
      break;
    case'auction_start':
      if(msg.actionData&&msg.actionData.propertyIdx!==undefined){
        const sp=PROPERTIES[msg.actionData.propertyIdx];
        if(sp&&!S._auction){S._auction={property:sp,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:(S.players.filter(p=>!p.bankrupt)[0]||{}).id};
          showAuctionModal(sp);closeModal();}
      }
      break;
    case'auction_bid':
      if(msg.actionData&&S._auction){
        const a=S._auction;
        if(a.property&&a.property.idx===msg.actionData.propertyIdx&&msg.actionData.amount>a.highestBid){
          a.highestBid=msg.actionData.amount;a.highestBidder=msg.actionData.bidderId;
          a.currentBidderIdx=(a.currentBidderIdx+1)%a.bidders.length;
          a.currentBidder=a.bidders[a.currentBidderIdx]?.id;
          renderAuctionModal(a.property);
        }
      }
      break;
    case'auction_pass':
      if(msg.actionData&&S._auction){
        const a=S._auction;
        if(a.property&&a.property.idx===msg.actionData.propertyIdx&&msg.actionData.bidderId){
          const bidderIdx=a.bidders.findIndex(b=>b.id===msg.actionData.bidderId);
          if(bidderIdx>=0){a.bidders.splice(bidderIdx,1);
            if(a.highestBidder===msg.actionData.bidderId||a.highestBidder===null){a.highestBidder=null;a.highestBid=0;}
            if(a.bidders.length<=1){if(a.highestBidder){const w=getP(a.highestBidder);if(w){w.money-=a.highestBid;S.propertyOwners[a.property.idx]=w.id;w.properties.push(a.property.idx);toast(`🔨 ${w.name} won auction!`);}}
              closeModal();S._auction=null;updateUI();renderPlayerPanels();}else{renderAuctionModal(a.property);}
          }
        }
      }
      break;
    case'auction_end':
      closeModal();S._auction=null;updateUI();renderPlayerPanels();break;
  }
}

// ============ UI ============
function showScreen(s){
  document.getElementById('lobbyScreen').classList.toggle('hidden',s!=='lobby');
  document.getElementById('roomScreen').classList.toggle('hidden',s!=='room');
}

function updateUI(){
  const cp=getCP(),my=isMyTurn();
  document.getElementById('turnInfo').innerHTML=cp?(my?'<strong>🎯 Your turn</strong>':`<strong>${cp.name}'s</strong> turn`):'Setting up...';
  document.getElementById('rollBtn').disabled=!my||S.rolled||S.gameOver||S.modalOpen||animatingDice;
  document.getElementById('endTurnBtn').classList.toggle('hidden',!my||!S.rolled||S.gameOver);
  document.getElementById('buildBtn').classList.toggle('hidden',!my||!canBuild(cp)||!cp);
  document.getElementById('bankruptcyBtn').classList.toggle('hidden',!(my&&cp&&cp.money<0));
}

function renderPlayerPanels(){
  const left=document.getElementById('leftStrip'),right=document.getElementById('rightStrip'),mobile=window.innerWidth<=768;
  let l='',r='';
  S.players.forEach((p,idx)=>{
    const cur=idx===S.currentPlayerIndex,local=p.id===S.playerId;
    const badges=p.properties.map(pi=>`<span style="width:12px;height:12px;border-radius:2px;background:${COLORS[PROPERTIES[pi]?.group]||'#ccc'};display:inline-block;${S.propertyMortgaged[pi]?'opacity:.4;':''}"></span>`).join('');
    const card=`<div class="player-card ${cur?'active':''}"><div class="hdr"><span class="nm">${p.name||'Player'}${local?' (You)':''}${p.bankrupt?' 💀':''}</span><span class="cash">$${p.money}</span></div>${p.inJail?'<span class="badge">🔒 IN JAIL</span>':''}<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;">${badges||'<span style="font-size:.65rem;color:#666;">None</span>'}</div></div>`;
    if(mobile||S.players.length<=2)l+=card;else if(idx<Math.ceil(S.players.length/2))l+=card;else r+=card;
  });
  left.innerHTML=l;right.innerHTML=r;
}

function showModal(title,content){
  closeModal();
  const c=document.getElementById('modalContainer');
  c.innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>${title}</h3><div class="modal-body">${content}</div></div></div>`;
  c.classList.remove('hidden');S.modalOpen=true;updateUI();
}

function closeModal(){
  document.getElementById('modalContainer').innerHTML='';
  document.getElementById('modalContainer').classList.add('hidden');
  S.modalOpen=false;S._auction=null;updateUI();
}
window.closeModal=closeModal;

function showBuyModal(space){
  const p=getCP();if(!p)return;

function showCardModal(card,type,player){

window.executeCard=executeCard;

function showAuctionModal(space){
  if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:S.players.filter(p=>!p.bankrupt)[0]?.id};
  renderAuctionModal(space);
}

function renderAuctionModal(space){
  const a=S._auction;if(!a)return;
  const isMyBid=a.currentBidder===S.playerId;
  const content=`<div style="text-align:center;"><div style="font-size:1.1rem;font-weight:600;">${space.name}</div><div style="font-size:2rem;font-weight:800;color:#ffd700;">$${a.highestBid}</div><div style="font-size:.85rem;color:#888;margin-bottom:12px;">${a.highestBidder?getP(a.highestBidder)?.name+' leads':'No bids yet'}</div></div><div style="display:flex;flex-direction:column;gap:4px;">${a.bidders.map(b=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;${b.id===a.currentBidder?'border:1px solid #ffd700;':''}"><span>${b.name}</span><span style="color:#888;">$${b.money}</span></div>`).join('')}</div>${isMyBid?`<div class="actions" style="margin-top:12px;"><button class="btn btn-primary" onclick="handleAuctionBid(PROPERTIES[${space.idx}],S.playerId,${a.highestBid+10})" ${(getP(S.playerId)||{}).money<a.highestBid+10?'disabled style="opacity:.5;"':''}>Bid $${a.highestBid+10}</button><button class="btn btn-danger" onclick="passAuction(S.playerId)">Pass</button></div>`:`<p style="text-align:center;color:#888;margin-top:12px;">Waiting for ${getP(a.currentBidder)?.name||'next'}...</p>`}`;
  showModal('🔨 Auction',content);
}

function toast(msg,type){
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>{if(t.parentElement)t.remove();},3000);
}

// ============ ANIMATION LOOP ============
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(world){world.step(1/60,dt,3);syncDice();}
  Object.values(avatarMeshes).forEach(a=>{animateAvatar(a,dt);updateAvatarMovement(a,dt);});
  controls.update();renderer.render(scene,camera);
}

// ============ INIT ============
async function init(){
  await loadCannonES();init3D();createDice();animate();

  document.querySelectorAll('.token-option').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.token-option').forEach(e=>e.classList.remove('selected'));
      el.classList.add('selected');S.playerToken=el.dataset.token;
    });
  });

  document.getElementById('createBtn').addEventListener('click',()=>{
    const n=document.getElementById('nameInput').value.trim()||'Player';
    S.playerName=n;S.playerId=rId();connectWS();
    const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'create_room',playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};
    setTimeout(t,500);
  });

  document.getElementById('joinBtn').addEventListener('click',()=>{
    const n=document.getElementById('nameInput').value.trim()||'Player';
    const c=document.getElementById('codeInput').value.trim().toUpperCase();
    if(!c){toast('Enter room code','error');return;}
    S.playerName=n;S.playerId=rId();connectWS();
    const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'join_room',roomCode:c,playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};
    setTimeout(t,500);
  });

  document.getElementById('startBtn').addEventListener('click',()=>{
    if(!S.isHost)return;
    initGame();
    send({type:'start_game',gameState:createSnapshot()});
    S.gameStarted=true;
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('roomScreen').classList.add('hidden');
    document.getElementById('gameContainer').classList.remove('hidden');
    updateUI();renderPlayerPanels();
  });

  document.getElementById('leaveBtn').addEventListener('click',()=>{
    send({type:'leave_room'});if(S.ws)S.ws.close();
    S.roomCode=null;showScreen('lobby');
  });

  document.getElementById('rollBtn').addEventListener('click',rollDiceGame);
  document.getElementById('endTurnBtn').addEventListener('click',endTurn);
  document.getElementById('buildBtn').addEventListener('click',showBuildModal);
  document.getElementById('mortgageBtn').addEventListener('click',showMortgageModal);
  document.getElementById('bankruptcyBtn').addEventListener('click',()=>{const cp=getCP();if(cp)handleBankruptcy(cp);});

  document.getElementById('playAgainBtn').addEventListener('click',()=>{
    document.getElementById('winScreen').classList.add('hidden');
    document.getElementById('gameContainer').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');
    S.gameStarted=false;
  });

  document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('createBtn').click();});
  document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('joinBtn').click();});
}
document.addEventListener('DOMContentLoaded',init);
</script>
