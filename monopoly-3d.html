<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monopoly 3D Online</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;overflow:hidden;background:#0a0a1a;color:#fff;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{display:block}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
.hidden{display:none!important}
#ui-overlay{position:fixed;inset:0;pointer-events:none;z-index:10}
#ui-overlay>*{pointer-events:auto}
#topBar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:20}
#topBar .room{font-size:0.75rem;color:#888;letter-spacing:2px}
#topBar .room strong{color:#ffd700}
#turnInfo{font-size:0.85rem;color:#ccc}
#turnInfo strong{color:#fff}
.action-bar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:20;overflow-x:auto}
.player-strip{position:fixed;left:0;top:48px;bottom:60px;width:180px;display:flex;flex-direction:column;gap:4px;padding:8px;overflow-y:auto;z-index:15}
.player-strip.right{left:auto;right:0}
.player-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;transition:all 0.3s}
.player-card.active{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.3)}
.player-card .hdr{display:flex;align-items:center;gap:6px}
.player-card .hdr .nm{font-size:0.75rem;font-weight:600;flex:1}
.player-card .hdr .cash{font-size:0.85rem;font-weight:700;color:#4caf50}
.player-card .props{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.player-card .prop{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,0.15)}
.player-card .badge{font-size:0.6rem;color:#ff6b6b}
.btn{padding:8px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;transition:all 0.2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a2e}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.12)}
.btn-danger{background:rgba(255,50,50,0.2);color:#ff6b6b;border:1px solid rgba(255,50,50,0.3)}
.btn-sm{padding:6px 12px;font-size:0.75rem}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:24px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;animation:slideUp 0.3s}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:12px;text-align:center}
.modal p{color:#bbb;line-height:1.5;margin-bottom:8px;font-size:0.9rem}
.modal .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.modal .actions .btn{flex:1;min-width:80px}
.toast-container{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);padding:8px 16px;border-radius:8px;font-size:0.8rem;color:#fff;animation:toastIn 0.3s,toastOut 0.3s 2.7s;pointer-events:auto}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.win-screen{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);animation:fadeIn 0.5s}
.win-screen h1{font-family:'Playfair Display',serif;font-size:3rem;color:#ffd700;margin-bottom:8px}
.win-screen .nm{font-size:1.3rem;color:#fff;margin-bottom:16px}
/* Tablet */
@media(max-width:1024px){
  .player-strip{width:140px;font-size:0.85rem}
  .player-strip .player-card{padding:6px}
  .player-card .hdr .nm{font-size:0.7rem}
  .player-card .hdr .cash{font-size:0.75rem}
}
/* Mobile */
@media(max-width:768px){
  .player-strip{width:100%;position:static;flex-direction:row;overflow-x:auto;padding:4px;gap:4px}
  .player-strip .player-card{min-width:110px;flex-shrink:0;padding:5px 7px}
  .player-card .hdr .nm{font-size:0.65rem}
  .player-card .hdr .cash{font-size:0.7rem}
  .player-card .props{display:none}
  .action-bar{gap:3px;padding:5px 6px}
  .action-bar .btn{font-size:0.65rem;padding:5px 8px}
  .player-strip.right{display:none}
  #topBar{padding:5px 10px}
  #topBar .room{font-size:0.65rem}
  #turnInfo{font-size:0.7rem}
  .modal{padding:16px;width:92%;max-width:340px}
  .modal h3{font-size:1rem}
  .modal p{font-size:0.8rem}
  .modal .actions .btn{font-size:0.7rem;padding:6px 10px;min-width:60px}
  .toast{font-size:0.7rem;padding:6px 12px}
  .btn{padding:6px 10px;font-size:0.7rem}
}
/* Small mobile */
@media(max-width:420px){
  .player-strip .player-card{min-width:80px;padding:4px 5px}
  .player-card .hdr .nm{font-size:0.55rem}
  .player-card .hdr .cash{font-size:0.6rem}
  .action-bar .btn{font-size:0.6rem;padding:6px 8px;min-height:36px;min-width:36px}
  .action-bar .btn-sm{padding:6px 8px}
  #topBar{padding:3px 6px}
  #turnInfo{font-size:0.6rem}
}
</style>
</head>
<body>

<div id="topBar">
  <div class="room"><span id="roomCodeLabel">Room: <strong id="roomCodeTop">---</strong></span></div>

  <div></div>

// ============================================================
// GAME STATE
// ============================================================
const S = {
  playerId:null, playerName:'', playerToken:'🚗', isHost:false, hostId:null,
  roomCode:null, ws:null, connected:false,
  gameStarted:false, players:[], currentPlayerIndex:0,

  chanceDeck:[], communityDeck:[],
  jailTurns:{}, jailFreeCards:{},
  modalOpen:false, tradeOffer:null
};
function getP(id){return S.players.find(p=>p.id===id)}
function getCP(){return S.players[S.currentPlayerIndex]}
function isMyTurn(){const cp=getCP();return cp&&cp.id===S.playerId}
// Expose to global scope for onclick handlers
window.S=S;window.PROPERTIES=PROPERTIES;window.COLORS=COLORS;window.TOKENS=TOKENS;
window.getCP=getCP;window.getP=getP;

// ============================================================
// 3D SCENE SETUP
// ============================================================
let scene, camera, renderer, controls, clock;
let boardGroup, diceMeshes=[], diceBodies=[], avatarMeshes={};
let world; // cannon world
let animatingDice=false;
let selectedSpace=null;
const spaceMeshes=[]; // Array of 3D objects for each space
const spaceLabels=[]; // Sprite labels
const houseModels=[]; // 3D houses
const boardPositions=[]; // 3D positions for each space

function init3D(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a5c2a);
  scene.fog=new THREE.Fog(0x1a5c2a,30,50);

  // Camera - auto-adjust for mobile
  const asp=window.innerWidth/window.innerHeight;
  camera=new THREE.PerspectiveCamera(40,asp,0.1,100);
  const isMobile=window.innerWidth<=768;
  const isTablet=window.innerWidth<=1024&&window.innerWidth>768;
  const dist=isMobile?22:(isTablet?18:16);
  const height=isMobile?18:(isTablet?15:14);
  camera.position.set(dist,height,dist);
  camera.lookAt(0,0,0);

  // Renderer
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;
  renderer.domElement.style.touchAction='none'; // Prevent browser touch interference
  document.body.prepend(renderer.domElement);

  // Controls
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0.5,0);
  controls.enableDamping=true;
  controls.dampingFactor=0.1;
  controls.minDistance=6;
  controls.maxDistance=30;
  controls.maxPolarAngle=Math.PI/2.2;
  controls.update();

  // Lights
  const amb=new THREE.AmbientLight(0x404060,0.4);
  scene.add(amb);
  const dir=new THREE.DirectionalLight(0xffeedd,1.2);
  dir.position.set(10,18,8);
  dir.castShadow=true;
  dir.shadow.mapSize.width=1024;
  dir.shadow.mapSize.height=1024;
  const d=20;
  dir.shadow.camera.left=-d;
  dir.shadow.camera.right=d;
  dir.shadow.camera.top=d;
  dir.shadow.camera.bottom=-d;
  dir.shadow.camera.near=1;
  dir.shadow.camera.far=30;
  scene.add(dir);
  const hem=new THREE.HemisphereLight(0x87ceeb,0x1a5c2a,0.4);
  scene.add(hem);
  const rim=new THREE.DirectionalLight(0x4488ff,0.3);
  rim.position.set(-8,4,-10);
  scene.add(rim);

  // Ground
  const groundGeo=new THREE.PlaneGeometry(60,60);
  const groundMat=new THREE.MeshStandardMaterial({color:0x0d3b1a,roughness:0.8});
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;
  ground.position.y=-0.5;
  ground.receiveShadow=true;
  scene.add(ground);

  window.addEventListener('resize',()=>{
    const a=window.innerWidth/window.innerHeight;
    camera.aspect=a; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
    // Re-position camera for orientation changes
    const mob=window.innerWidth<=768;
    const tab=window.innerWidth<=1024&&window.innerWidth>768;
    const d=mob?22:(tab?18:16),h=mob?18:(tab?15:14);
    camera.position.set(d,h,d);
    controls.target.set(0,0.5,0);
    controls.update();
    // Re-layout player panels
    renderPlayerPanels();
  });

  buildBoard();
}

// ============================================================
// 3D BOARD
// ============================================================
function buildBoard(){
  boardGroup=new THREE.Group();
  scene.add(boardGroup);

  // Board base
  const baseMat=new THREE.MeshStandardMaterial({color:0xe8f5e9,roughness:0.6});
  const baseGeo=new THREE.BoxGeometry(11,0.3,11);
  const base=new THREE.Mesh(baseGeo,baseMat);
  base.position.y=-0.15;
  base.receiveShadow=true;
  boardGroup.add(base);

  // Grid positions (same as 2D, mapped to 3D)
  // 13x13 grid, each cell = 1 unit, centered at 0,0
  // Corner at (-5.5, -5.5), each cell is 11/13 ≈ 0.846 units
  const cellSize=11/13;
  const offset=5.5-cellSize/2;

  // Map board position to 3D (x,z)
  function gridPos(r,c){
    // r,c are 1-indexed grid positions
    return {x:-offset+(c-1)*cellSize+cellSize/2, z:-offset+(r-1)*cellSize+cellSize/2};
  }

  // Board positions for spaces (same mapping as before)
  const bottomPos=[
    {r:'12/14',c:'1/3'},{r:'12/14',c:'3/4'},{r:'12/14',c:'4/5'},{r:'12/14',c:'5/6'},{r:'12/14',c:'6/7'},
    {r:'12/14',c:'7/8'},{r:'12/14',c:'8/9'},{r:'12/14',c:'9/10'},{r:'12/14',c:'10/11'},{r:'12/14',c:'11/12'},{r:'12/14',c:'12/14'}
  ];
  const rightPos=[
    {r:'11/12',c:'12/14'},{r:'10/11',c:'12/14'},{r:'9/10',c:'12/14'},{r:'8/9',c:'12/14'},{r:'7/8',c:'12/14'},
    {r:'6/7',c:'12/14'},{r:'5/6',c:'12/14'},{r:'4/5',c:'12/14'},{r:'3/4',c:'12/14'},{r:'1/3',c:'12/14'}
  ];
  const topPos=[
    {r:'1/3',c:'11/12'},{r:'1/3',c:'10/11'},{r:'1/3',c:'9/10'},{r:'1/3',c:'8/9'},{r:'1/3',c:'7/8'},
    {r:'1/3',c:'6/7'},{r:'1/3',c:'5/6'},{r:'1/3',c:'4/5'},{r:'1/3',c:'3/4'},{r:'1/3',c:'1/3'}
  ];
  const leftPos=[
    {r:'3/4',c:'1/3'},{r:'4/5',c:'1/3'},{r:'5/6',c:'1/3'},{r:'6/7',c:'1/3'},{r:'7/8',c:'1/3'},
    {r:'8/9',c:'1/3'},{r:'9/10',c:'1/3'},{r:'10/11',c:'1/3'},{r:'11/12',c:'1/3'}
  ];

  const allPositions=[];
  for(let i=0;i<=10;i++)allPositions[i]=bottomPos[i];
  for(let i=11;i<=20;i++)allPositions[i]=rightPos[i-11];
  for(let i=21;i<=30;i++)allPositions[i]=topPos[i-21];
  for(let i=31;i<=39;i++)allPositions[i]=leftPos[i-31];

  // Parse grid position strings
  function parseGrid(rStr,cStr){
    const rParts=rStr.split('/').map(Number);
    const cParts=cStr.split('/').map(Number);
    const rCenter=(rParts[0]+rParts[1])/2;
    const cCenter=(cParts[0]+cParts[1])/2;
    // Convert 13-based grid to 3D coords
    const x=-offset+(cCenter-1)*cellSize+cellSize/2;
    const z=-offset+(rCenter-1)*cellSize+cellSize/2;
    // Width and depth
    const w=(cParts[1]-cParts[0])*cellSize;
    const d=(rParts[1]-rParts[0])*cellSize;
    return {x,z,w,d};
  }

  // Build each space
  for(let i=0;i<40;i++){
    const p=allPositions[i];
    if(!p)continue;
    const gp=parseGrid(p.r,p.c);
    const prop=PROPERTIES[i];
    const isCorner=prop.type==='go'||prop.type==='jail'||prop.type==='freeparking'||prop.type==='gotojail';

    const height=isCorner?0.25:0.2;
    const color=getColor(prop);
    const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(color),roughness:0.5,metalness:0.1});

    const geo=new THREE.BoxGeometry(gp.w-0.05,height,gp.d-0.05);
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(gp.x,height/2,gp.z);
    mesh.castShadow=true;
    mesh.receiveShadow=true;
    mesh.userData.spaceIdx=i;
    boardGroup.add(mesh);
    spaceMeshes[i]=mesh;
    boardPositions[i]={x:gp.x,z:gp.z};

    // Color strip on top
    if(prop.type==='property'||prop.type==='railroad'||prop.type==='utility'){
      const stripMat=new THREE.MeshStandardMaterial({color:new THREE.Color(getColor(prop)),roughness:0.3,metalness:0.05});
      const stripGeo=new THREE.BoxGeometry(gp.w-0.1,0.02,gp.d*0.15);
      const strip=new THREE.Mesh(stripGeo,stripMat);
      strip.position.set(gp.x,height+0.01,gp.z+gp.d*0.35);
      boardGroup.add(strip);
    }

    // Label sprite
    const label=makeTextSprite(prop.name.replace(' Ave','').replace(' Pl',''),isCorner?0.3:0.2);
    label.position.set(gp.x,height+0.15,gp.z);
    boardGroup.add(label);
    spaceLabels[i]=label;

    // Click handler via raycasting
    mesh.userData.clickable=true;

    // Houses placeholder
    houseModels[i]=[];
  }

  // Center decoration
  const centerMat=new THREE.MeshStandardMaterial({color:0xc8e6c9,roughness:0.7});
  const centerGeo=new THREE.BoxGeometry(7.5,0.05,7.5);
  const centerMesh=new THREE.Mesh(centerGeo,centerMat);
  centerMesh.position.set(0,0.03,0);
  centerMesh.receiveShadow=true;
  boardGroup.add(centerMesh);

  // Logo text in center
  const logo=makeTextSprite('MONOPOLY',0.6,true);
  logo.position.set(0,0.2,0);
  boardGroup.add(logo);

  // Corner decorations
  addCornerLabel('GO',[-5.2,0.2,-5.2],'🎲');
  addCornerLabel('JAIL',[-5.2,0.2,5.2],'🔒');
  addCornerLabel('FREE\nPARKING',[5.2,0.2,5.2],'🅿️');
  addCornerLabel('GO TO\nJAIL',[5.2,0.2,-5.2],'🚨');
}

function getColor(prop){
  if(!prop||!prop.group)return '#e0e0e0';
  return COLORS[prop.group]||'#e0e0e0';
}

function makeTextSprite(text,size,gold){
  const canvas=document.createElement('canvas');
  canvas.width=256;
  canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  if(gold){
    ctx.font='Bold 36px Arial';
    ctx.fillStyle='#1b5e20';
    ctx.fillText(text,128,34);
  }else{
    ctx.font='Bold 28px Arial';
    ctx.fillStyle='#333';
    ctx.fillText(text,128,34);
  }
  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(size*8,size*2,1);
  return sprite;
}

function addCornerLabel(text,xz,emoji){
  const canvas=document.createElement('canvas');
  canvas.width=128;
  canvas.height=128;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,128,128);
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font='24px Arial';
  ctx.fillStyle='#1b5e20';
  const lines=text.split('\n');
  lines.forEach((l,i)=>ctx.fillText(l,64,60+i*22));
  ctx.font='32px Arial';
  ctx.fillText(emoji,64,26);
  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:true});
  const sprite=new THREE.Sprite(mat);
  sprite.position.set(xz[0],xz[1]+0.5,xz[2]);
  sprite.scale.set(1.2,1.2,1);
  boardGroup.add(sprite);
}

function createAvatar(typeIdx,playerColor){
  const info=AVATAR_TYPES[typeIdx%AVATAR_TYPES.length];
  const group=new THREE.Group();
  const matSkin=new THREE.MeshStandardMaterial({color:info.skin,roughness:0.7});
  const matShirt=new THREE.MeshStandardMaterial({color:playerColor||info.shirt,roughness:0.5});
  const matPants=new THREE.MeshStandardMaterial({color:info.pants,roughness:0.6});
  const matShoes=new THREE.MeshStandardMaterial({color:info.shoes,roughness:0.8});
  const matHair=new THREE.MeshStandardMaterial({color:info.hair,roughness:0.8});
  const h=info.height;

  // Body parts (hierarchical)
  const body=new THREE.Group(); // root

  // Torso
  const torsoW=0.4*(info.build==='slender'?0.8:info.build==='athletic'?1.1:1);
  const torsoD=0.25;
  const torsoH=h*0.3;
  const torso=new THREE.Mesh(new THREE.BoxGeometry(torsoW,torsoH,torsoD),matShirt);
  torso.position.y=torsoH/2;
  torso.castShadow=true;
  body.add(torso);

  // Head
  const headR=0.13*h;
  const head=new THREE.Mesh(new THREE.SphereGeometry(headR,12,12),matSkin);
  head.position.y=torsoH+headR*0.8;
  head.castShadow=true;
  body.add(head);

  // Hair
  const hairMat=new THREE.MeshStandardMaterial({color:info.hair,roughness:0.9});
  const hair=new THREE.Mesh(new THREE.SphereGeometry(headR*1.05,12,12),hairMat);
  hair.position.y=head.position.y+headR*0.15;
  hair.scale.y=0.5;
  hair.scale.z=0.85;
  body.add(hair);

  // Eyes
  const eyeMat=new THREE.MeshStandardMaterial({color:'#fff'});
  const pupilMat=new THREE.MeshStandardMaterial({color:'#222'});
  [-1,1].forEach(side=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.025*h,8,8),eyeMat);
    eye.position.set(side*0.08*h,torsoH+headR*0.7,headR*0.8);
    body.add(eye);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.012*h,8,8),pupilMat);
    pupil.position.set(side*0.08*h,torsoH+headR*0.7,headR*0.9);
    body.add(pupil);
  });

  // Mouth
  const mouthMat=new THREE.MeshStandardMaterial({color:'#c77'});
  const mouth=new THREE.Mesh(new THREE.BoxGeometry(0.06*h,0.01*h,0.02*h),mouthMat);
  mouth.position.set(0,torsoH+headR*0.35,headR*0.85);
  body.add(mouth);

  // Arms
  const armLen=h*0.32;
  const armR=0.045*h;
  const upperArmMat=matShirt;
  const lowerArmMat=matSkin;

  [-1,1].forEach(side=>{
    const shoulder=new THREE.Group();
    shoulder.position.set(side*(torsoW/2+0.02),torsoH*0.85,0);

    const upperA=new THREE.Mesh(new THREE.CylinderGeometry(armR*0.8,armR,armLen*0.45,8),upperArmMat);
    upperA.position.y=-armLen*0.225;
    upperA.castShadow=true;
    shoulder.add(upperA);

    const elbow=new THREE.Group();
    elbow.position.y=-armLen*0.45;

    const lowerA=new THREE.Mesh(new THREE.CylinderGeometry(armR*0.7,armR*0.5,armLen*0.45,8),lowerArmMat);
    lowerA.position.y=-armLen*0.225;
    lowerA.castShadow=true;
    elbow.add(lowerA);

    // Hand
    const hand=new THREE.Mesh(new THREE.SphereGeometry(armR*0.7,6,6),matSkin);
    hand.position.y=-armLen*0.45;
    elbow.add(hand);

    shoulder.add(elbow);
    shoulder.userData.type='arm';
    shoulder.userData.side=side;
    shoulder.userData.elbow=elbow;
    body.add(shoulder);
  });

  // Legs
  const legLen=h*0.4;
  const legR=0.06*h;
  [-1,1].forEach(side=>{
    const hip=new THREE.Group();
    hip.position.set(side*0.12*h,0.02,0);

    const upperL=new THREE.Mesh(new THREE.CylinderGeometry(legR*1.1,legR,legLen*0.45,8),matPants);
    upperL.position.y=-legLen*0.225;
    upperL.castShadow=true;
    hip.add(upperL);

    const knee=new THREE.Group();
    knee.position.y=-legLen*0.45;

    const lowerL=new THREE.Mesh(new THREE.CylinderGeometry(legR,legR*0.7,legLen*0.45,8),matPants);
    lowerL.position.y=-legLen*0.225;
    lowerL.castShadow=true;
    knee.add(lowerL);

    // Foot
    const foot=new THREE.Mesh(new THREE.BoxGeometry(0.06*h,0.03*h,0.1*h),matShoes);
    foot.position.set(0,-legLen*0.45,0.03*h);
    knee.add(foot);

    hip.add(knee);
    hip.userData.type='leg';
    hip.userData.side=side;
    hip.userData.knee=knee;
    body.add(hip);
  });

  group.add(body);
  group.userData={body,info,arms:[],legs:[]};
  group.userData.animTime=0;
  group.userData.walking=false;
  group.userData.targetPos=null;
  group.userData.moveSpeed=2.5;

  // Store references
  body.children.forEach(c=>{
    if(c.userData.type==='arm')group.userData.arms.push(c);
    if(c.userData.type==='leg')group.userData.legs.push(c);
  });

  // Scale to unit
  group.scale.set(1,1,1);
  group.position.y=0;

  return group;
}

function animateAvatar(avatar,delta){
  if(!avatar||!avatar.userData)return;
  const ud=avatar.userData;
  const speed=ud.walking?1:0;
  ud.animTime+=delta*speed*5;

  const t=ud.animTime;

  // Walk cycle
  ud.arms.forEach((arm,i)=>{
    const side=arm.userData.side;
    arm.rotation.x=Math.sin(t+Math.PI*i)*0.5*speed;
  });

  ud.legs.forEach((leg,i)=>{
    const side=leg.userData.side;
    leg.rotation.x=Math.sin(t+Math.PI*0.5+Math.PI*i)*0.4*speed;
  });

  // Body bob
  if(ud.walking){
    ud.body.position.y=Math.abs(Math.sin(t))*0.05;
  }
}

function moveAvatarTo(avatar,toX,toZ,onComplete){
  if(!avatar)return;
  const ud=avatar.userData;
  ud.targetPos={x:toX,z:toZ};
  ud.walking=true;
  ud.onWalkComplete=onComplete;
}

function updateAvatarMovement(avatar,delta){
  if(!avatar||!avatar.userData||!avatar.userData.walking)return;
  const ud=avatar.userData;
  const tp=ud.targetPos;
  if(!tp)return;

  const dx=tp.x-avatar.position.x;
  const dz=tp.z-avatar.position.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  if(dist<0.05){
    avatar.position.x=tp.x;
    avatar.position.z=tp.z;
    ud.walking=false;
    if(ud.onWalkComplete){ud.onWalkComplete();ud.onWalkComplete=null;}
    return;
  }

  const step=ud.moveSpeed*delta;
  const ratio=Math.min(step/dist,1);
  avatar.position.x+=dx*ratio;
  avatar.position.z+=dz*ratio;

  // Face direction of movement
  const angle=Math.atan2(dx,dz);
  avatar.rotation.y=angle;
}

function lerpColor(c1,c2,t){
  const r1=(c1>>16)&255,g1=(c1>>8)&255,b1=c1&255;
  const r2=(c2>>16)&255,g2=(c2>>8)&255,b2=c2&255;
  const r=r1+(r2-r1)*t,g=g1+(g2-g1)*t,b=b1+(b2-b1)*t;
  return (Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b);
}

function loadCannonES(){
  return new Promise((resolve)=>{
    const script=document.createElement('script');
    // Use unpkg instead of cdnjs - cannon-es is not on cdnjs
    script.src='https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';
    let resolved=false;
    const done=()=>{if(resolved)return;resolved=true;
      if(typeof CANNON==='undefined'){resolve();return;}
      world=new CANNON.World();
      world.gravity.set(0,-15,0);
      world.broadphase=new CANNON.NaiveBroadphase();
      world.solver.iterations=10;
      const groundBody=new CANNON.Body({mass:0});
      groundBody.addShape(new CANNON.Plane());
      groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);
      groundBody.position.y=-0.5;
      world.addBody(groundBody);
      resolve();
    };
    script.onload=done;
    script.onerror=done;
    document.head.appendChild(script);
    // Timeout after 5s - game works without physics dice
    setTimeout(done,5000);
  });
}

function createDice(){
  diceMeshes=[];
  diceBodies=[];
  diceSceneGroup=new THREE.Group();
  scene.add(diceSceneGroup);

  const mat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.2,metalness:0.1});
  const size=0.35;

  const geo=new THREE.BoxGeometry(size,size,size);

  [-1,1].forEach((sign,idx)=>{
    const mesh=new THREE.Mesh(geo.clone(),mat.clone());
    mesh.castShadow=true;
    mesh.position.set(0,2+idx*0.8,0);
    mesh.visible=false;
    diceSceneGroup.add(mesh);
    diceMeshes.push(mesh);

    const body=new CANNON.Body({mass:0.5,shape:new CANNON.Box(new CANNON.Vec3(size/2,size/2,size/2))});
    body.position.set(0,3+idx*0.8,0);
    body.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0),Math.random()*Math.PI*2);
    world.addBody(body);
    diceBodies.push(body);
  });
}

function rollDice3D(d1,d2,onComplete){
  if(animatingDice)return;
  animatingDice=true;

  diceMeshes.forEach((m,i)=>{
    m.visible=true;
    const pos=i===0?d1:d2;
    // Position dice above board center
    const startY=3+Math.random()*0.5;
    diceBodies[i].position.set(Math.random()-0.5,startY,Math.random()-0.5);
    diceBodies[i].velocity.set((Math.random()-0.5)*5,-3,(Math.random()-0.5)*5);
    diceBodies[i].angularVelocity.set((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20);
  });

  // Apply stopping force after delay
  setTimeout(()=>{
    let settled=0;
    const checkSettled=()=>{
      let allSettled=true;
      diceBodies.forEach(b=>{
        if(b.velocity.length()>0.1||b.angularVelocity.length()>0.1)allSettled=false;
      });
      if(allSettled){
        settled++;
        if(settled>=2){
          animatingDice=false;
          if(onComplete)onComplete();
          return;
        }
      }
      setTimeout(checkSettled,100);
    };
    setTimeout(checkSettled,500);
  },500);
}

function syncDice(){
  diceMeshes.forEach((mesh,i)=>{
    if(!mesh.visible)return;
    const body=diceBodies[i];
    mesh.position.copy(body.position);
    mesh.quaternion.copy(body.quaternion);

    // Keep on board
    if(body.position.y<-2){
      body.position.set(0,1,0);
      body.velocity.set(0,0,0);
    }
  });
}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function rId(){return Math.random().toString(36).substring(2,10)+Date.now().toString(36);}
function grp(g){return PROPERTIES.filter(p=>p.group===g&&p.type==='property');}
function ownsFull(pid,g){const gp=grp(g);return gp.length>0&&gp.every(p=>S.propertyOwners[p.idx]===pid);}
function cntRR(pid){return[5,15,25,35].filter(i=>S.propertyOwners[i]===pid).length;}
function cntUtil(pid){return[12,28].filter(i=>S.propertyOwners[i]===pid).length;}

function getRent(idx){
  const p=PROPERTIES[idx],o=S.propertyOwners[idx];
  if(!o||S.propertyMortgaged[idx])return 0;
  const h=S.propertyHouses[idx];
  if(p.type==='railroad')return[0,25,50,100,200][cntRR(o)];
  if(p.type==='utility'){const c=cntUtil(o);return c===1?S.diceValue[0]+S.diceValue[1]*4:S.diceValue[0]+S.diceValue[1]*10;}
  if(h===0)return ownsFull(o,p.group)?p.rent*2:p.rent;
  if(h===5)return p.rentHotel;
  return[p.rent,p.rent1h,p.rent2h,p.rent3h,p.rent4h][h]||p.rent;
}

function initGame(){
  S.chanceDeck=shuffle([...CHANCE_CARDS]);
  S.communityDeck=shuffle([...COMMUNITY_CARDS]);
  S.propertyOwners=new Array(40).fill(null);
  S.propertyHouses=new Array(40).fill(0);
  S.propertyMortgaged=new Array(40).fill(false);
  S.jailTurns={};S.jailFreeCards={};
  S.gameOver=false;S.rolled=false;S.doublesCount=0;S.diceValue=[1,1];

  S.players.forEach(p=>{
    p.money=1500;p.position=0;p.inJail=false;p.bankrupt=false;p.properties=[];
    S.jailTurns[p.id]=0;S.jailFreeCards[p.id]=0;
  });
  S.players=shuffle(S.players);
  S.currentPlayerIndex=0;

  // Create 3D avatars for each player
  createAvatarMeshes();
}

function createAvatarMeshes(){
  // Remove old avatars
  Object.values(avatarMeshes).forEach(a=>{if(a.parent)scene.remove(a);});
  avatarMeshes={};

  const colors=['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1'];
  S.players.forEach((p,idx)=>{
    const avatar=createAvatar(idx,colors[idx%6]);
    const pos=boardPositions[0];
    avatar.position.set(pos.x,0,pos.z);
    scene.add(avatar);
    avatarMeshes[p.id]=avatar;
  });
}

function rollDiceGame(){
  if(!isMyTurn()||S.gameOver||S.modalOpen||animatingDice)return;
  const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
  S.diceValue=[d1,d2];S.rolled=true;
  const isDoubles=d1===d2,cp=getCP();
  if(!cp)return;
  if(isDoubles)S.doublesCount++;else S.doublesCount=0;

  // Animate dice
  rollDice3D(d1,d2,()=>{
    if(S.doublesCount>=3){
      toast(`${cp.name} rolled 3 doubles! Go to Jail!`);
      goToJail(cp);S.doublesCount=0;
      endTurn();broadcastGameAction('roll',{d1,d2,isDoubles,gotoJail:true});
      return;
    }
    if(cp.inJail){handleJailRoll(cp,isDoubles,d1+d2);broadcastGameAction('roll',{d1,d2,isDoubles,jailStay:true});return;}
    movePlayerGame(cp,d1+d2,()=>{
      if(isDoubles){toast('Doubles! Roll again!');S.rolled=false;updateUI();}
      broadcastGameAction('roll',{d1,d2,isDoubles});
    });
  });
  updateUI();
}

function movePlayerGame(player,steps,onDone){
  const oldPos=player.position,newPos=(oldPos+steps)%40;
  if(newPos<oldPos&&steps>0){player.money+=200;toast(`${player.name} passed GO! +$200`);}

  // Animate avatar walking along path
  const avatar=avatarMeshes[player.id];
  if(!avatar){player.position=newPos;handleLanding(player);if(onDone)onDone();return;}

  // Walk step by step
  let step=0;
  const walkStep=()=>{
    if(step>=steps){
      player.position=newPos;
      handleLanding(player);
      updateUI();
      if(onDone)onDone();
      return;
    }
    step++;
    const currentPos=(oldPos+step)%40;
    const target=boardPositions[currentPos];
    if(target){
      moveAvatarTo(avatar,target.x,target.z,()=>{
        avatar.userData.walking=false;
        walkStep();
      });
    }else{
      walkStep();
    }
  };
  walkStep();
}

function handleLanding(player){
  const space=PROPERTIES[player.position];
  if(!space)return;
  switch(space.type){
    case'property':case'railroad':case'utility':handlePropLand(player,space);break;
    case'chance':case'community':drawCard(player,space.type);break;
    case'tax':payTax(player,space);break;
    case'gotojail':goToJail(player);endTurn();break;
  }
}

function handlePropLand(player,space){
  const o=S.propertyOwners[space.idx];
  if(o===player.id)return;
  if(o!==null&&o!==undefined){
    const owner=getP(o);
    if(owner&&!S.propertyMortgaged[space.idx]){
      const rent=getRent(space.idx),actual=Math.min(rent,player.money);
      player.money-=actual;owner.money+=actual;
      toast(`${player.name} paid $${actual} rent to ${owner.name}`);
      if(player.money<=0)handleDebt(player);
    }
    return;
  }
  if(space.price){showBuyModal(space);}
}

function payTax(player,space){
  const a=Math.min(space.taxAmount,player.money);
  player.money-=a;toast(`Paid $${a} tax`);
  if(player.money<=0)handleDebt(player);
  updateUI();
}

function goToJail(player){
  player.position=10;player.inJail=true;S.jailTurns[player.id]=0;
  // Move avatar to jail
  const a=avatarMeshes[player.id];
  if(a&&boardPositions[10]){a.position.x=boardPositions[10].x;a.position.z=boardPositions[10].z;}
  toast(`${player.name} went to Jail!`);
  updateUI();
}

function drawCard(player,type){
  const dn=type==='chance'?'chanceDeck':'communityDeck';
  if(S[dn].length===0)S[dn]=shuffle([...(type==='chance'?CHANCE_CARDS:COMMUNITY_CARDS)]);
  const card=S[dn].pop();
  showCardModal(card,type,player);
}

function executeCard(card,player){
  switch(card.action){
    case'goto':
      if(card.value<player.position){player.money+=200;toast('Passed GO!');}
      player.position=card.value;handleLanding(player);break;
    case'collect':player.money+=card.value;toast(`+$${card.value}`);break;
    case'pay':{const a=Math.min(card.value,player.money);player.money-=a;toast(`-$${a}`);if(player.money<=0)handleDebt(player);break;}
    case'jailfree':S.jailFreeCards[player.id]=(S.jailFreeCards[player.id]||0)+1;toast('Got Jail Free card!');break;
    case'gotojail':goToJail(player);break;
    case'back3':player.position=(player.position-card.value+40)%40;handleLanding(player);break;
    case'nearest_rr':{const rrs=[5,15,25,35];let n=rrs.find(r=>r>player.position);if(n===undefined)n=rrs[0];if(n<player.position)player.money+=200;player.position=n;handleLanding(player);break;}
    case'nearest_utility':{const u=[12,28];let n=u.find(x=>x>player.position);if(n===undefined)n=u[0];if(n<player.position)player.money+=200;player.position=n;handleLanding(player);break;}
    case'repairs':{let t=0;for(const p of player.properties){const h=S.propertyHouses[p];t+=h===5?card.hotelValue:h*card.value;}t=Math.min(t,player.money);player.money-=t;toast(`Paid $${t} repairs`);if(player.money<=0)handleDebt(player);break;}
    case'pay_each':{let t=0;S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,player.money-t);player.money-=a;p.money+=a;t+=a;}});toast(`Paid $${t}`);if(player.money<=0)handleDebt(player);break;}
    case'collect_each':S.players.forEach(p=>{if(p.id!==player.id&&!p.bankrupt){const a=Math.min(card.value,p.money);p.money-=a;player.money+=a;}});toast(`Collected $${card.value} each`);break;
  }
  updateUI();renderPlayerPanels();
}

// Simplified jail (no card usage modal in 3D)
function handleJailRoll(cp,isDoubles,total){
  if(isDoubles){toast(`${cp.name} rolled doubles! Out of jail!`);cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);return;}
  S.jailTurns[cp.id]=(S.jailTurns[cp.id]||0)+1;
  if(S.jailTurns[cp.id]>=3){
    if(cp.money>=50){cp.money-=50;cp.inJail=false;S.jailTurns[cp.id]=0;movePlayerGame(cp,total);}
    else handleBankruptcy(cp);
  }else{toast(`Jail (turn ${S.jailTurns[cp.id]}/3)`);endTurn();}
}

function buyProp(player,space){
  if(player.money<space.price){toast('Not enough!','error');startAuction(space);return;}
  player.money-=space.price;S.propertyOwners[space.idx]=player.id;player.properties.push(space.idx);
  toast(`Bought ${space.name}!`);closeModal();updateUI();renderPlayerPanels();
  broadcastGameAction('buy',{propertyIdx:space.idx});
}

function startAuction(space){closeModal();showAuctionModal(space);}
function handleAuctionBid(space,bidderId,amount){
  if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0};
  const a=S._auction,bidder=getP(bidderId);
  if(amount>a.highestBid&&bidder.money>=amount){a.highestBid=amount;a.highestBidder=bidderId;a.currentBidderIdx=(a.currentBidderIdx+1)%a.bidders.length;renderAuctionModal(space);broadcastGameAction('auction_bid',{propertyIdx:space.idx,bidderId,amount});}
}
function passAuction(bidderId){
  const a=S._auction;if(!a)return;
  a.bidders=a.bidders.filter(b=>b.id!==bidderId);
  if(a.highestBidder===bidderId){a.highestBidder=null;a.highestBid=0;}
  if(a.bidders.length<=1){
    if(a.highestBidder){const w=getP(a.highestBidder);if(w){w.money-=a.highestBid;S.propertyOwners[a.property.idx]=w.id;w.properties.push(a.property.idx);toast(`${w.name} won!`);}}
    closeModal();S._auction=null;updateUI();renderPlayerPanels();broadcastGameAction('auction_end',{propertyIdx:a.property.idx});return;
  }
  renderAuctionModal(a.property);broadcastGameAction('auction_pass',{propertyIdx:a.property.idx,bidderId});
}

function endTurn(){
  if(!isMyTurn())return;
  S.rolled=false;S.modalOpen=false;
  let ni=S.currentPlayerIndex,att=0;
  do{ni=(ni+1)%S.players.length;att++;}while(S.players[ni].bankrupt&&att<=S.players.length);
  S.currentPlayerIndex=ni;
  updateUI();renderPlayerPanels();broadcastGameAction('end_turn',{nextPlayerIndex:ni});
}

function handleDebt(p){if(!tryLiquidate(p))handleBankruptcy(p);updateUI();renderPlayerPanels();}
function tryLiquidate(p){
  if(p.money>=0)return true;
  for(const pi of[...p.properties]){
    if(S.propertyHouses[pi]>0&&S.propertyHouses[pi]<6){S.propertyHouses[pi]--;p.money+=Math.floor((PROPERTIES[pi].buildCost||50)/2);if(p.money>=0)return true;}
  }
  for(const pi of[...p.properties]){if(!S.propertyMortgaged[pi]&&S.propertyHouses[pi]===0){S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;if(p.money>=0)return true;}}
  return p.money>=0;
}
function handleBankruptcy(p){
  p.bankrupt=true;toast(`${p.name} bankrupt!`,'error');
  for(let i=0;i<40;i++){if(S.propertyOwners[i]===p.id){S.propertyOwners[i]=null;S.propertyHouses[i]=0;S.propertyMortgaged[i]=false;}}
  p.properties=[];
  const act=S.players.filter(x=>!x.bankrupt);
  if(act.length<=1)endGame(act[0]);
  updateUI();renderPlayerPanels();broadcastGameAction('bankruptcy',{playerId:p.id});
}

function endGame(w){
  S.gameOver=true;
  document.getElementById('winnerName').textContent=`${w.name} wins!`;
  document.getElementById('winScreen').classList.remove('hidden');
  broadcastGameAction('game_over',{winnerId:w.id});
  // Confetti
  const c=['#ffd700','#ff6b6b','#4caf50','#2196f3','#ff9800','#e91e63'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='toast';p.textContent='🎉';p.style.position='fixed';p.style.left=Math.random()*100+'vw';p.style.top='-10px';p.style.animation=`confettiFall ${2+Math.random()*2}s forwards`;p.style.fontSize=(10+Math.random()*20)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),4000);}
}

// ===== BUILDING =====
function canBuild(p){return p&&p.properties.some(pi=>{const pr=PROPERTIES[pi];return pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)&&S.propertyHouses[pi]<5;});}
function showBuildModal(){
  const p=getCP();if(!p||!canBuild(p))return;
  const groups={};
  p.properties.forEach(pi=>{const pr=PROPERTIES[pi];if(pr.group&&pr.type==='property'&&ownsFull(p.id,pr.group)){if(!groups[pr.group])groups[pr.group]=[];groups[pr.group].push(pr);}});
  const content=Object.entries(groups).map(([g,props])=>`<div style="margin-bottom:10px;"><div style="font-size:0.85rem;font-weight:600;color:#bbb;display:flex;align-items:center;gap:6px;margin-bottom:4px;"><span style="width:12px;height:12px;border-radius:3px;background:${COLORS[g]||'#ccc'};display:inline-block;"></span>${g} ($${PROPERTIES[props[0]?.idx]?.buildCost||50}/house)</div>${props.map(pr=>{const h=S.propertyHouses[pr.idx],m=h>=5,c=pr.buildCost;return`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:2px;"><span style="font-size:0.8rem;">${pr.name}</span><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:0.75rem;color:#888;">${'🏠'.repeat(Math.min(h,4))}${h===5?'🏨':''}</span>${m?'<span style="font-size:0.7rem;color:#4caf50;">MAX</span>':`<button class="btn btn-sm btn-green" onclick="doBuild3D(${pr.idx})" ${p.money<c?'disabled style="opacity:0.5;"':''}>Build $${c}</button>`}</div></div>`;}).join('')}</div>`).join('')||'<p style="color:#888;">No properties eligible.</p>';
  showModal('🏗️ Build Houses',content);
}
function doBuild3D(pi){const p=getCP();if(!p)return;const pr=PROPERTIES[pi];if(!pr||p.money<pr.buildCost||S.propertyHouses[pi]>=5)return;p.money-=pr.buildCost;S.propertyHouses[pi]++;toast(`Built on ${pr.name}`);closeModal();updateUI();renderPlayerPanels();broadcastGameAction('build',{propertyIdx:pi});addHouseModel(pi);}

function addHouseModel(spaceIdx){
  const pos=boardPositions[spaceIdx];
  const houses=S.propertyHouses[spaceIdx];
  if(!pos||houses===0)return;
  // Remove old
  houseModels[spaceIdx].forEach(m=>{if(m.parent)boardGroup.remove(m);});
  houseModels[spaceIdx]=[];

  const count=Math.min(houses,5);
  const isHotel=houses>=5;
  for(let i=0;i<count;i++){
    const mat=new THREE.MeshStandardMaterial({color:isHotel?0xff4444:0x44aa44,roughness:0.5});
    const h=isHotel?0.25:0.15;
    const geo=new THREE.BoxGeometry(0.12,h,0.12);
    const mesh=new THREE.Mesh(geo,mat);
    const spread=(count-1)*0.08;
    mesh.position.set(pos.x-i*0.08+spread/2,h/2+0.25,pos.z);
    mesh.castShadow=true;
    boardGroup.add(mesh);
    houseModels[spaceIdx].push(mesh);
  }
}

// ===== MORTGAGE/TRADE =====
function showMortgageModal(){
  const p=getCP();if(!p)return;
  const content=p.properties.map(pi=>{const pr=PROPERTIES[pi];const m=S.propertyMortgaged[pi];if(S.propertyHouses[pi]>0)return'';const uc=Math.ceil(pr.mortgage*1.1);return`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:4px;"><span style="font-size:0.8rem;">${pr.name}</span>${m?`<button class="btn btn-sm btn-secondary" onclick="doUnmortgage3D(${pi})" ${p.money<uc?'disabled style="opacity:0.5;"':''}>Unmortgage $${uc}</button>`:`<button class="btn btn-sm btn-secondary" onclick="doMortgage3D(${pi})">Mortgage $${pr.mortgage}</button>`}</div>`;}).filter(Boolean).join('')||'<p style="color:#888;">No properties.</p>';
  showModal('🏦 Mortgage',content);
}
function doMortgage3D(pi){const p=getCP();if(!p||S.propertyHouses[pi]>0)return;S.propertyMortgaged[pi]=true;p.money+=PROPERTIES[pi].mortgage;toast('Mortgaged!');closeModal();updateUI();renderPlayerPanels();broadcastGameAction('mortgage',{propertyIdx:pi});}
function doUnmortgage3D(pi){const p=getCP();if(!p)return;const c=Math.ceil(PROPERTIES[pi].mortgage*1.1);if(p.money<c)return;p.money-=c;S.propertyMortgaged[pi]=false;toast('Unmortgaged!');closeModal();updateUI();renderPlayerPanels();broadcastGameAction('unmortgage',{propertyIdx:pi});}

// ===== MULTIPLAYER =====
function connectWS(){
  const p=window.location.protocol==='https:'?'wss:':'ws:';
  const ws=new WebSocket(`${p}//${window.location.host}`);
  S.ws=ws;
  ws.onopen=()=>{S.connected=true;};
  ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data));}catch(ex){}};
  ws.onclose=()=>{S.connected=false;S.ws=null;if(S.gameStarted)setTimeout(connectWS,3000);};
}
function send(m){if(S.ws&&S.ws.readyState===WebSocket.OPEN)S.ws.send(JSON.stringify(m));}
function handleMsg(msg){
  switch(msg.type){
    case'room_created':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=true;S.hostId=msg.playerId;
      document.getElementById('roomCodeTop').textContent=msg.roomCode;
      document.getElementById('roomCode').textContent=msg.roomCode;
      showScreen('room');updatePlayerList(msg.players);break;
    case'room_joined':S.roomCode=msg.roomCode;S.playerId=msg.playerId;S.isHost=false;S.hostId=msg.hostId;
      document.getElementById('roomCodeTop').textContent=msg.roomCode;
      document.getElementById('roomCode').textContent=msg.roomCode;
      showScreen('room');updatePlayerList(msg.players);break;
    case'player_joined':updatePlayerList(msg.players);toast(`${msg.player.name} joined`);break;
    case'player_left':updatePlayerList(msg.players);break;
    case'new_host':S.hostId=msg.hostId;if(msg.hostId===S.playerId){S.isHost=true;document.getElementById('startBtn').classList.remove('hidden');toast('You are now host');}break;
    case'player_disconnected':updatePlayerList(msg.players);toast('Player disconnected','error');break;
    case'game_started':startGameFromServer(msg.gameState);break;
    case'game_action':applyRemoteAction(msg);break;
    case'error':toast(msg.message,'error');break;
  }
}

function updatePlayerList(players){
  const list=document.getElementById('playerList');
  if(!list)return;
  list.innerHTML=players.map(p=>`<div class="player-item"><span class="status-dot ${p.connected?'online':'offline'}"></span><span class="name">${p.name||'Player'}</span>${p.id===S.playerId?'<span style="font-size:0.65rem;color:#888;font-style:italic;">(you)</span>':''}${p.id===S.hostId?'<span class="host-badge">HOST</span>':''}</div>`).join('');
}

function startGameFromServer(gameState){
  Object.assign(S,gameState);
  S.gameStarted=true;
  S.localPlayerIndex=S.players.findIndex(p=>p.id===S.playerId);
  document.getElementById('lobbyScreen').classList.add('hidden');
  document.getElementById('gameContainer').classList.remove('hidden');
  initGame();
  updateUI();
  renderPlayerPanels();
}

function broadcastGameAction(action,actionData){
  send({type:'game_action',playerId:S.playerId,action,actionData:actionData||{},gameState:createSnapshot()});
}
function createSnapshot(){return{players:S.players.map(p=>({...p})),propertyOwners:[...S.propertyOwners],propertyHouses:[...S.propertyHouses],propertyMortgaged:[...S.propertyMortgaged],chanceDeck:[...S.chanceDeck],communityDeck:[...S.communityDeck],jailTurns:{...S.jailTurns},jailFreeCards:{...S.jailFreeCards},currentPlayerIndex:S.currentPlayerIndex,doublesCount:S.doublesCount};}
function applyRemoteAction(msg){
  if(msg.gameState){
    S.players=msg.gameState.players;S.propertyOwners=msg.gameState.propertyOwners;
    S.propertyHouses=msg.gameState.propertyHouses;S.propertyMortgaged=msg.gameState.propertyMortgaged;
    S.chanceDeck=msg.gameState.chanceDeck;S.communityDeck=msg.gameState.communityDeck;
    S.jailTurns=msg.gameState.jailTurns;S.jailFreeCards=msg.gameState.jailFreeCards;
    S.currentPlayerIndex=msg.gameState.currentPlayerIndex;S.doublesCount=msg.gameState.doublesCount;
  }
  updateUI();renderPlayerPanels();
}

// ===== UI =====
function showScreen(s){
  document.getElementById('lobbyScreen').classList.toggle('hidden',s!=='lobby');
  document.getElementById('roomScreen').classList.toggle('hidden',s!=='room');
}
function updateUI(){
  const cp=getCP(),my=isMyTurn();
  document.getElementById('turnInfo').innerHTML=cp?(my?'<strong>Your turn</strong>':`<strong>${cp.name}'s</strong> turn`):'Setting up...';
  document.getElementById('rollBtn').disabled=!my||S.rolled||S.gameOver||S.modalOpen||animatingDice;
  document.getElementById('endTurnBtn').classList.toggle('hidden',!my||!S.rolled||S.gameOver);
  document.getElementById('buildBtn').classList.toggle('hidden',!my||!canBuild(cp)||!cp);
  document.getElementById('tradeBtn').classList.toggle('hidden',!my||S.gameOver);
  document.getElementById('bankruptcyBtn').classList.toggle('hidden',!(my&&cp&&cp.money<0));
}
function renderPlayerPanels(){
  const left=document.getElementById('leftStrip'),right=document.getElementById('rightStrip'),mobile=window.innerWidth<=768;
  let l='',r='';
  const colors=['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1'];
  S.players.forEach((p,idx)=>{
    const cur=idx===S.currentPlayerIndex,local=p.id===S.playerId;
    const badges=p.properties.map(pi=>`<span class="prop" style="background:${COLORS[PROPERTIES[pi]?.group]||'#ccc'};${S.propertyMortgaged[pi]?'opacity:0.4;':''}"></span>`).join('');
    const card=`<div class="player-card ${cur?'active':''}"><div class="hdr"><span class="nm">${p.name||'Player'}${local?' (You)':''}${p.bankrupt?' 💀':''}</span><span class="cash">$${p.money}</span></div>${p.inJail?'<span class="badge">🔒 IN JAIL</span>':''}<div class="props">${badges||'<span style="font-size:0.65rem;color:#666;">None</span>'}</div></div>`;
    if(mobile||S.players.length<=2)l+=card;else if(idx<Math.ceil(S.players.length/2))l+=card;else r+=card;
  });
  left.innerHTML=l;right.innerHTML=r;
}

function showModal(title,content){
  closeModal();
  const c=document.getElementById('modalContainer');
  c.innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>${title}</h3><div class="modal-body">${content}</div></div></div>`;
  c.classList.remove('hidden');S.modalOpen=true;updateUI();
}
function closeModal(){
  document.getElementById('modalContainer').innerHTML='';
  document.getElementById('modalContainer').classList.add('hidden');
  S.modalOpen=false;S._auction=null;
  updateUI();
}
function showBuyModal(space){
  const p=getCP();if(!p)return;
  showModal('🏠 Property',`<p style="text-align:center;font-size:1.1rem;font-weight:600;">${space.name}</p><p style="text-align:center;font-size:1.3rem;font-weight:700;color:#ffd700;">$${space.price}</p><p style="text-align:center;color:#888;">Balance: $${p.money}</p><div class="actions"><button class="btn btn-primary" onclick="buyProp(getCP(),PROPERTIES[${space.idx}])" ${p.money>=space.price?'':'disabled style="opacity:0.5;"'}>Buy</button><button class="btn btn-secondary" onclick="startAuction(PROPERTIES[${space.idx}])">Auction</button><button class="btn btn-secondary" onclick="closeModal();endTurn();">Skip</button></div>`);
}
function showCardModal(card,type,player){
  const icon=type==='chance'?'❓':'📦';
  S._lastCard=card;S._lastCardPlayer=player;
  showModal('',`<div style="text-align:center;padding:12px;"><div style="font-size:2.5rem;">${icon}</div><div style="background:rgba(255,255,255,0.06);padding:12px;border-radius:8px;font-size:0.95rem;line-height:1.5;">${card.text}</div><div class="actions" style="justify-content:center;margin-top:12px;"><button class="btn btn-primary" onclick="closeModal();executeCard(S._lastCard,S._lastCardPlayer);S._lastCard=null;S._lastCardPlayer=null;">OK</button></div></div>`);
}
function showAuctionModal(space){
  if(!S._auction)S._auction={property:space,highestBid:0,highestBidder:null,bidders:[...S.players.filter(p=>!p.bankrupt)],currentBidderIdx:0,currentBidder:S.players.filter(p=>!p.bankrupt)[0]?.id};
  renderAuctionModal(space);
}
function renderAuctionModal(space){
  const a=S._auction;if(!a)return;
  const isMyBid=a.currentBidder===S.playerId;
  const content=`<div style="text-align:center;padding:12px;"><div style="font-size:1.1rem;">${space.name}</div><div style="font-size:2rem;font-weight:800;color:#ffd700;">$${a.highestBid}</div><div style="font-size:0.85rem;color:#888;">${a.highestBidder?getP(a.highestBidder)?.name+' leads':'No bids'}</div></div><div style="display:flex;flex-direction:column;gap:4px;margin-top:8px;">${a.bidders.map(b=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:6px;${b.id===a.currentBidder?'border:1px solid #ffd700;':''}"><span>${b.name}</span><span style="color:#888;">$${b.money}</span></div>`).join('')}</div>${isMyBid?`<div class="actions" style="margin-top:12px;"><button class="btn btn-primary" onclick="handleAuctionBid(PROPERTIES[${space.idx}],S.playerId,${a.highestBid+10})" ${(getP(S.playerId)||{}).money<a.highestBid+10?'disabled style="opacity:0.5;"':''}>Bid $${a.highestBid+10}</button><button class="btn btn-danger" onclick="passAuction(S.playerId)">Pass</button></div>`:`<p style="text-align:center;color:#888;margin-top:8px;">Waiting for ${getP(a.currentBidder)?.name||'next'}...</p>`}`;
  showModal('🔨 Auction',content);
}

function toast(msg,type){
  const c=document.getElementById('toastContainer'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>{if(t.parentElement)t.remove();},3000);
}

// ===== ANIMATION LOOP =====
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  // Physics
  if(world){
    world.step(1/60,dt,3);
    syncDice();
  }

  // Animate avatars
  Object.values(avatarMeshes).forEach(a=>{
    animateAvatar(a,dt);
    updateAvatarMovement(a,dt);
  });

  controls.update();
  renderer.render(scene,camera);
}

// ===== INIT =====
async function init(){
  await loadCannonES();
  init3D();
  createDice();
  animate();

  // Lobby setup
  document.querySelectorAll('.token-option').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.token-option').forEach(e=>e.classList.remove('selected'));
      el.classList.add('selected');S.playerToken=el.dataset.token;
    });
  });

  document.getElementById('createBtn').addEventListener('click',()=>{
    const n=document.getElementById('nameInput').value.trim()||'Player';
    S.playerName=n;S.playerId=rId();connectWS();
    const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'create_room',playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};
    setTimeout(t,500);
  });

  document.getElementById('joinBtn').addEventListener('click',()=>{
    const n=document.getElementById('nameInput').value.trim()||'Player';
    const c=document.getElementById('codeInput').value.trim().toUpperCase();
    if(!c){toast('Enter room code','error');return;}
    S.playerName=n;S.playerId=rId();connectWS();
    const t=()=>{if(S.ws&&S.ws.readyState===WebSocket.OPEN)send({type:'join_room',roomCode:c,playerId:S.playerId,playerName:n,playerToken:S.playerToken});else setTimeout(t,500);};
    setTimeout(t,500);
  });

  document.getElementById('startBtn').addEventListener('click',()=>{
    if(!S.isHost)return;
    initGame();
    send({type:'start_game',gameState:createSnapshot()});
    S.gameStarted=true;
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('roomScreen').classList.add('hidden');
    document.getElementById('gameContainer').classList.remove('hidden');
    updateUI();renderPlayerPanels();
  });

  document.getElementById('leaveBtn').addEventListener('click',()=>{
    send({type:'leave_room'});if(S.ws)S.ws.close();
    S.roomCode=null;showScreen('lobby');
  });

  document.getElementById('rollBtn').addEventListener('click',rollDiceGame);      document.getElementById('roomCode').textContent=S.roomCode||'------';
  document.getElementById('endTurnBtn').addEventListener('click',endTurn);
  document.getElementById('buildBtn').addEventListener('click',showBuildModal);
  document.getElementById('mortgageBtn').addEventListener('click',showMortgageModal);
  document.getElementById('tradeBtn').addEventListener('click',()=>{toast('Trade coming soon in 3D!');});
  document.getElementById('bankruptcyBtn').addEventListener('click',()=>{const cp=getCP();if(cp)handleBankruptcy(cp);});

  document.getElementById('playAgainBtn').addEventListener('click',()=>{
    document.getElementById('winScreen').classList.add('hidden');
    document.getElementById('gameContainer').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');
    S.gameStarted=false;
  });

  document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('createBtn').click();});
  document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('joinBtn').click();});
}

document.addEventListener('DOMContentLoaded',init);
</script>
